# 接表 agent —— GitHub 按钮触发 → 调 Railway onboarder 端点起草 → 推草稿分支 + 给开 PR 链接。
# 见 docs/16 / onboarder/README。Railway 跑 LLM(它连得上中转站,GitHub Actions 连不上);
# GH 这边只做 git —— 拿回草稿、推分支。只需 contents:write,不碰"允许 Actions 开 PR"开关。
name: 接表 agent (onboard a feishu table)

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "品牌_期数,如 TXQ_phase1"
        required: true
      feishu_app_token:
        description: "飞书表 app_token (bascn.../A2sy...)"
        required: true
      feishu_table_id:
        description: "飞书表 table_id (tbl...)"
        required: true
      sample_n:
        description: "拉多少行文案样本"
        required: false
        default: "30"

jobs:
  onboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 调 Railway onboarder 起草(Railway 连得上网关)
        env:
          ONBOARDER_URL: ${{ secrets.ONBOARDER_URL }}
          ONBOARDER_API_KEY: ${{ secrets.ONBOARDER_API_KEY }}
        run: |
          [ -n "$ONBOARDER_URL" ] || { echo "❌ 缺 secret ONBOARDER_URL(Railway 端点地址)"; exit 1; }
          code=$(curl -sS -w "%{http_code}" -o /tmp/resp.json --max-time 220 \
            -X POST "${ONBOARDER_URL%/}/onboard" \
            -H "X-Onboarder-Key: $ONBOARDER_API_KEY" \
            -H "content-type: application/json" \
            -d "{\"project_id\":\"${{ inputs.project_id }}\",\"app_token\":\"${{ inputs.feishu_app_token }}\",\"table_id\":\"${{ inputs.feishu_table_id }}\",\"sample_n\":${{ inputs.sample_n }}}")
          echo "HTTP $code"
          [ "$code" = "200" ] || { echo "❌ 端点返回非 200:"; cat /tmp/resp.json; echo; exit 1; }

      - name: 写出草稿文件
        run: |
          jq -r '.mapping_yaml'  /tmp/resp.json > "mappings/${{ inputs.project_id }}.yaml"
          jq -r '.review_brief'  /tmp/resp.json > "mappings/${{ inputs.project_id }}.brief.md"
          echo "── 校验 ──"
          echo "词表 errors:   $(jq -c '.errors'    /tmp/resp.json)"
          echo "未覆盖列(D-021):$(jq -c '.uncovered' /tmp/resp.json)"
          echo "待确认项:       $(jq -r '.pending | length' /tmp/resp.json) 项"

      - name: 推草稿分支 + 给出开 PR 链接
        run: |
          git config user.name "onboarder-bot"
          git config user.email "onboarder@users.noreply.github.com"
          b="onboarder/draft-${{ inputs.project_id }}"
          git checkout -b "$b"
          git add "mappings/${{ inputs.project_id }}.yaml" "mappings/${{ inputs.project_id }}.brief.md"
          git commit -m "接表草稿: ${{ inputs.project_id }}(agent 起草,待策略 lead 审)"
          git push -f -u origin "$b"
          echo "::notice title=草稿已就绪::分支 $b 已推送"
          echo "👉 点这里开 PR: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/main...$b?expand=1"
