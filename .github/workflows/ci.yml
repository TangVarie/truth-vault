          -- v_autowriter_injection_candidates view (D-036): eligibility filters
          -- 数值推断 / 老笔记 / 无 aw 映射的 / 趴 都必须被过滤掉.
          UPDATE truth_vault.projects
            SET mapping_to_autowriter_project_id = '00000000-0000-0000-0000-000000000001'::uuid
            WHERE project_id = 'CI_OK';
