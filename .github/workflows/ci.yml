          -- Mirror of sanshengliubu's actual schema/db/migrations/005_reference_samples_v2.sql.
          -- Catches drift between truth-vault's sync write shape and what
          -- ssll actually accepts. Bringing in the full column set here
          -- means 001_add_source_tv_note_id.sql and build_reference_sample
          -- both run against a faithful stub.
          CREATE TABLE IF NOT EXISTS public.reference_samples (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              title TEXT NOT NULL DEFAULT '未命名样本',
              source_type TEXT DEFAULT 'screenshot',
              content_text TEXT,
              analysis JSONB,
              image_url TEXT,
              tags TEXT[] DEFAULT '{}',
              post_title TEXT,
              post_body TEXT,
              cover_image_b64 TEXT,
              top_comments JSONB DEFAULT '[]'::jsonb,
              platform TEXT,
              category TEXT,
              ai_analysis JSONB,
              quality_score INTEGER DEFAULT 0,
              created_by TEXT DEFAULT 'default',
              created_at TIMESTAMPTZ DEFAULT now()
          );
          -- All 5 autowriter tables in public, so migration 001 has
          -- something to move into the autowriter schema. Production has
          -- richer columns; this is a minimum viable footprint.
          -- user_id / owner_id 列必须在 stub 里就有,
          -- 否则后续 ALTER TABLE SET SCHEMA 搬过去之后, 002 的
          -- "CREATE UNIQUE INDEX ON items (user_id, ...)" 会 ERROR
          -- column "user_id" does not exist. 同理 006 的 backfill
          -- 也读 projects.owner_id / batches.user_id (CI 暂时不跑
          -- 006, 但放在 stub 里跟生产 schema 对齐, 防后续测试加进来时
          -- 又踩同样的坑).
          CREATE TABLE IF NOT EXISTS public.projects (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              owner_id UUID
          );
          CREATE TABLE IF NOT EXISTS public.batches (
              id UUID PRIMARY KEY, project_id UUID, user_id UUID, tactic TEXT
          );
          CREATE TABLE IF NOT EXISTS public.items (
              id UUID PRIMARY KEY, status TEXT, example_label TEXT, user_id UUID
          );
          CREATE TABLE IF NOT EXISTS public.versions (
              id UUID PRIMARY KEY, item_id UUID
          );
          CREATE TABLE IF NOT EXISTS public.memories (
              id UUID PRIMARY KEY
          );
          SQL
          psql -v ON_ERROR_STOP=1 -f sanshengliubu-patches/001_add_source_tv_note_id.sql
          psql -v ON_ERROR_STOP=1 -f autowriter-migrations/001_create_autowriter_schema.sql
          psql -v ON_ERROR_STOP=1 -f autowriter-migrations/002_add_external_source.sql
          psql -v ON_ERROR_STOP=1 -f autowriter-migrations/003_add_example_label_proposal.sql
          # TV → ssll write smoke test: a TV-shaped reference_samples INSERT
          # must succeed against the v2 schema. Mirrors build_reference_sample
          # output exactly — if columns drift, this fails before any prod run.
          psql -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO public.reference_samples (
              id, title, source_type, content_text, post_title, post_body,
              top_comments, platform, category, ai_analysis,
              quality_score, tags, source_truth_vault_note_id, created_at
          ) VALUES (
              gen_random_uuid(),
              -- Mirrors build_reference_sample post-2026-05-21 audit fix:
              -- source_type='pack' (sanshengliubu reads `.eq("source_type","pack")`)
              -- platform='小红书' (sanshengliubu UI/retrieval uses 中文)
              'TV smoke title', 'pack', 'TV smoke body',
              'TV smoke title', 'TV smoke body',
              '[{"text":"评论1","role":"素人","pinned":false},
                {"text":"评论2","role":"贴主","pinned":true}]'::jsonb,
              '小红书', '保健品',
              '{"_truth_vault_note_id":"NUC_phase1_rec1",
                "_truth_vault_tier":"爆",
                "_truth_vault_brand":"NUC"}'::jsonb,
              100, ARRAY['truth_vault_sync','爆']::TEXT[],
              'NUC_phase1_rec1', NOW()
          );
          DO $$
          DECLARE n INT; pt TEXT;
          BEGIN
              SELECT COUNT(*), MAX(post_title) INTO n, pt
              FROM public.reference_samples
              WHERE source_truth_vault_note_id = 'NUC_phase1_rec1';
              IF n != 1 OR pt != 'TV smoke title' THEN
                  RAISE EXCEPTION 'TV → ssll smoke INSERT failed: rows=% post_title=%', n, pt;
              END IF;
              RAISE NOTICE 'TV → ssll smoke INSERT OK (rows=%)', n;
          END $$;
          -- Idempotency: re-inserting with the same source_truth_vault_note_id
          -- now violates a partial UNIQUE index (2026-05-22 audit P1-3 fix).
          -- Application layer still pre-checks via existing_ssll_sample_id()
          -- to skip the round-trip, but DB-level UNIQUE is the actual
          -- correctness guarantee under concurrency. Confirm the index
          -- exists AND is unique (the old patch 001 created it as a plain
          -- INDEX which would silently allow duplicates).
          DO $$
          DECLARE
              is_unique BOOLEAN;
          BEGIN
              SELECT i.indisunique INTO is_unique
              FROM pg_index i
              JOIN pg_class c ON c.oid = i.indexrelid
              JOIN pg_namespace n ON n.oid = c.relnamespace
              WHERE n.nspname = 'public'
                AND c.relname IN ('idx_reference_samples_tv_note',
                                  'idx_reference_samples_tv_note_id_unique');
              IF is_unique IS NULL THEN
