name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python syntax + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scripts dependencies (from lockfile for reproducibility)
        run: |
          python -m pip install --upgrade pip
          # Prefer the lockfile so CI reproduces exactly what production runs.
          # requirements.txt is the high-level "what we depend on"; .lock is
          # "the resolved versions we tested against". If .lock drifts from
          # .txt (e.g. someone adds a new dep without regenerating), CI will
          # install stale versions for the new dep until lock is refreshed.
          if [ -f scripts/requirements.lock ]; then
            pip install -r scripts/requirements.lock
          else
            pip install -r scripts/requirements.txt
          fi
      - name: Compile all scripts
        run: |
          python -m py_compile \
            scripts/_common.py \
            scripts/sync_feishu_notes_to_truth_vault.py \
            scripts/sync_comments_from_raw_extra.py \
            scripts/annotate_essence_pass.py \
            scripts/sync_truth_vault_baokuan_to_sanshengliubu.py \
            scripts/sync_truth_vault_baokuan_to_autowriter_items.py \
            scripts/extract_negative_examples_from_autowriter.py \
            sanshengliubu-patches/import_truth_vault_baokuan.py
      - name: Comment parser unit tests
        working-directory: scripts
        run: |
          python - <<'PY'
          from sync_comments_from_raw_extra import parse_comment_text

          cases = [
              ("1. 用户A: 第一条\n2. 用户B: 第二条",
               [("素人", "第一条"), ("素人", "第二条")]),
              ("贴主: 谢谢姐妹\n素人小红: 好用吗",
               [("贴主", "谢谢姐妹"), ("素人", "好用吗")]),
              ("用户A | 第一条\n用户B | 第二条",
               [("素人", "第一条"), ("素人", "第二条")]),
              ("好用\n不好用",
               [("素人", "好用"), ("素人", "不好用")]),
              ("\n1.\n用户: 内容\n\n",
               [("素人", "内容")]),
              ("贴主:感谢",
               [("贴主", "感谢")]),
          ]
          failed = []
          for i, (text, expected) in enumerate(cases, 1):
              actual = list(parse_comment_text(text))
              if actual != expected:
                  failed.append((i, expected, actual))
                  print(f"  case {i}: FAIL\n    expected: {expected}\n    got:      {actual}")
              else:
                  print(f"  case {i}: ok")
          if failed:
              raise SystemExit(f"\n{len(failed)} parser test(s) failed")
          print(f"\n{len(cases)}/{len(cases)} passed")
          PY
      - name: Essence vocab validator self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          import annotate_essence_pass as a
          # Sanity: vocab sets are non-empty + match expected sizes from
          # docs/05-controlled-vocab.md v0.2.
          assert len(a.EMOTIONAL_LEVERS) == 12, f"levers: {len(a.EMOTIONAL_LEVERS)}"
          assert len(a.HUMAN_TRUTH_ARCHETYPES) == 19, f"archetypes: {len(a.HUMAN_TRUTH_ARCHETYPES)}"
          assert len(a.TREND_DEPENDENCIES) == 10, f"deps: {len(a.TREND_DEPENDENCIES)}"
          assert len(a.CONTENT_FORMATS) == 8, f"formats: {len(a.CONTENT_FORMATS)}"

          # Negative case: lever / valence mismatch
          bad = {"essence": {
              "emotional_lever": "焦虑撬动", "emotional_valence": "positive",
              "emotional_intensity": "high",
              "human_truth_archetype": ["健康焦虑"],
              "trend_dependencies": ["通用"],
              "content_format": "情感叙事",
          }}
          errs = a.validate_essence(bad)
          assert any("negative but valence=positive" in e for e in errs), errs

          # Negative case: 通用 must be exclusive
          bad2 = {"essence": {
              "emotional_lever": "焦虑撬动", "emotional_valence": "negative",
              "emotional_intensity": "high",
              "human_truth_archetype": ["健康焦虑"],
              "trend_dependencies": ["通用", "当代流行词"],
              "content_format": "情感叙事",
          }}
          errs = a.validate_essence(bad2)
          assert any("通用" in e for e in errs), errs

          # Positive case: clean valid record
          good = {"essence": {
              "emotional_lever": "焦虑撬动", "emotional_valence": "negative",
              "emotional_intensity": "high",
              "human_truth_archetype": ["健康焦虑", "育儿焦虑"],
              "trend_dependencies": ["平台话术"],
              "content_format": "情感叙事",
          }}
          assert a.validate_essence(good) == [], a.validate_essence(good)
          print("vocab validator self-check OK")
          PY
      - name: Essence annotator retry + failed_queue self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          import tempfile, json
          from pathlib import Path
          import annotate_essence_pass as a

          # 1. build_retry_prompt embeds errors and the prior raw response
          orig = "Original prompt"
          raw = '{"bad": "json"}'
          retry = a.build_retry_prompt(orig, raw, ["err_a", "err_b"])
          assert "err_a" in retry and "err_b" in retry and raw in retry
          print("  ✓ build_retry_prompt embeds context")

          # 2. _annotate_with_retry: validation fails first, succeeds second
          calls = []
          good_payload = ('{"essence":{"emotional_lever":"焦虑撬动",'
                          '"emotional_valence":"negative","emotional_intensity":"high",'
                          '"human_truth_archetype":["健康焦虑"],'
                          '"trend_dependencies":["平台话术"],"content_format":"情感叙事"},'
                          '"audience":{}}')
          bad_valence = ('{"essence":{"emotional_lever":"焦虑撬动",'
                         '"emotional_valence":"positive","emotional_intensity":"high",'
                         '"human_truth_archetype":["健康焦虑"],'
                         '"trend_dependencies":["平台话术"],"content_format":"情感叙事"},'
                         '"audience":{}}')

          a.call_claude = lambda p, m: (calls.append(p), bad_valence if len(calls) == 1 else good_payload)[1]
          parsed, errs, _, used_retry = a._annotate_with_retry("test", "fake")
          assert parsed is not None and parsed["essence"]["emotional_valence"] == "negative"
          assert len(calls) == 2
          assert used_retry is True, "used_retry should be True after a retry"
          print("  ✓ retry recovers after first-attempt validation failure")

          # 3. Both attempts fail → None
          calls.clear()
          a.call_claude = lambda p, m: (calls.append(p), bad_valence)[1]
          parsed, errs, _, used_retry = a._annotate_with_retry("test", "fake")
          assert parsed is None
          assert used_retry is True
          assert any("emotional_lever" in e or "valence" in e for e in errs), errs
          print("  ✓ returns None when both attempts fail")

          # 4. First attempt returns non-JSON → JSON parse failure → retry succeeds
          calls.clear()
          a.call_claude = lambda p, m: (calls.append(p), "not json" if len(calls) == 1 else good_payload)[1]
          parsed, errs, _, used_retry = a._annotate_with_retry("test", "fake")
          assert parsed is not None
          assert used_retry is True
          print("  ✓ retry recovers from initial JSON parse failure")

          # 4b. First attempt succeeds → used_retry False
          calls.clear()
          a.call_claude = lambda p, m: (calls.append(p), good_payload)[1]
          parsed, errs, _, used_retry = a._annotate_with_retry("test", "fake")
          assert parsed is not None
          assert used_retry is False, "used_retry should be False on a first-shot win"
          assert len(calls) == 1
          print("  ✓ first-shot success records used_retry=False")

          # 5. failed_queue writes valid JSONL
          with tempfile.NamedTemporaryFile(delete=False, suffix=".jsonl", mode="w") as f:
              p = Path(f.name)
          try:
              a._append_failed_queue(p, {"note_id": "N1"}, "P1", ["e1"], "raw")
              a._append_failed_queue(p, {"note_id": "N2"}, "P1", ["e2"], "raw2")
              lines = p.read_text(encoding="utf-8").strip().split("\n")
              assert len(lines) == 2
              r = json.loads(lines[0])
              assert r["note_id"] == "N1" and "attempted_at" in r
          finally:
              p.unlink(missing_ok=True)
          print("  ✓ failed_queue writes valid JSONL")
          print("\nannotate_essence retry + failed_queue: all 5 checks passed")
          PY
      - name: Essence annotator sub_direction classification self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          import annotate_essence_pass as a

          mapping = {
              "project_id": "TEST_P",
              "direction_decomposition": {
                  "营养保健代餐相关": {
                      "sub_directions": [
                          {"name": "营养代餐_健身减脂",
                           "detection_signal": "健身 / 减脂",
                           "content_format": "情感叙事",
                           "target_audience": ["年轻女性"],
                           "user_pain_point": "蛋白质摄入"},
                          {"name": "营养代餐_关心父母营养",
                           "detection_signal": "父母 / 老人饮食",
                           "content_format": "情感叙事",
                           "target_audience": ["子女"],
                           "user_pain_point": "父母饮食单一"},
                      ]
                  },
                  "糖尿病相关": {  # single direction (no sub_directions) → not applicable
                      "content_format": "情感叙事",
                      "target_audience": ["病患家属"],
                  }
              }
          }

          # 1. get_sub_directions_for_note returns the right shape
          note_multi = {"raw_extra": {"_direction_raw": "营养保健代餐相关"}}
          result = a.get_sub_directions_for_note(mapping, note_multi)
          assert result is not None, "should detect multi-sub_direction config"
          raw, subs = result
          assert raw == "营养保健代餐相关" and len(subs) == 2
          print("  ✓ get_sub_directions_for_note returns multi-direction config")

          # 2. Single-direction config returns None (deterministic lift done at sync time)
          note_single = {"raw_extra": {"_direction_raw": "糖尿病相关"}}
          assert a.get_sub_directions_for_note(mapping, note_single) is None
          print("  ✓ single-direction config bypasses LLM pass")

          # 3. Unknown direction returns None
          note_unknown = {"raw_extra": {"_direction_raw": "不存在的方向"}}
          assert a.get_sub_directions_for_note(mapping, note_unknown) is None
          print("  ✓ unknown direction bypasses LLM pass")

          # 4. classify_sub_direction validates against allowed set
          allowed = {"营养代餐_健身减脂", "营养代餐_关心父母营养"}
          a.call_claude = lambda p, m: '{"sub_direction": "营养代餐_健身减脂", "confidence": 0.9, "reasoning": "test"}'
          chosen, errs = a.classify_sub_direction("p", "m", allowed)
          assert chosen == "营养代餐_健身减脂" and errs == [], (chosen, errs)
          print("  ✓ classify_sub_direction accepts valid name")

          # 5. classify_sub_direction rejects name not in allowed set
          a.call_claude = lambda p, m: '{"sub_direction": "made_up_name", "confidence": 0.9, "reasoning": "x"}'
          chosen, errs = a.classify_sub_direction("p", "m", allowed)
          assert chosen is None
          assert any("not in allowed" in e for e in errs), errs
          print("  ✓ classify_sub_direction rejects name not in allowed set")

          # 6. apply_sub_direction_to_update lifts the right fields
          update = {"emotional_lever": "焦虑撬动"}  # existing essence field, preserved
          a.apply_sub_direction_to_update(update, subs, "营养代餐_关心父母营养")
          assert update["direction_subtype"] == "营养代餐_关心父母营养"
          assert update["target_audience"] == ["子女"]
          assert update["user_pain_point"] == "父母饮食单一"
          assert update["emotional_lever"] == "焦虑撬动"  # untouched
          print("  ✓ apply_sub_direction_to_update lifts the right fields")

          # 7. build_sub_direction_prompt embeds names + detection_signals
          prompt = a.build_sub_direction_prompt(
              "营养保健代餐相关", subs,
              {"title": "T", "body": "测试正文"}
          )
          assert "营养代餐_健身减脂" in prompt and "营养代餐_关心父母营养" in prompt
          assert "健身 / 减脂" in prompt and "父母 / 老人饮食" in prompt
          print("  ✓ build_sub_direction_prompt embeds all sub_directions")

          print("\nsub_direction classification: all 7 checks passed")
          PY
      - name: transform_row tier fallback + metric-only stripping self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          # Two regressions the new tests defend against:
          #   1. Item 2 — tier="未知" (mapped from "评估中") + interactions over
          #      threshold should auto-promote to 爆/大爆, not stay 未知.
          #   2. Item 3 — metric-only cols (likes/saves/shares/comments_count/
          #      search_rank/keyword_rank) must NOT end up in the notes payload,
          #      they only belong in metric_snapshots.
          import sync_feishu_notes_to_truth_vault as s

          mapping = {
              "project_id": "TEST_P",
              "platform": "xiaohongshu",
              "field_mapping": {
                  "文案":   "raw_content",
                  "互动量": "interactions",
                  "点赞":   "likes",
                  "收藏":   "saves",
                  "评论数": "comments_count",
                  "状态":   "_status_raw",
              },
              "tier_thresholds": {"爆": 100, "大爆": 1000},
              "tier_extraction": {
                  "source": "状态字段",
                  "rules": [
                      {"match_contains": ["大爆"], "tier": "大爆"},
                      {"match_contains": ["评估中"], "tier": "未知"},
                  ],
              },
          }

          # Case A: 评估中 + interactions=500 (over 爆 threshold) → must promote to 爆.
          # The old code only fired numeric fallback when tier was None; "评估中"
          # mapped to "未知" so it stayed there forever.
          note_a, metric_a, _ = s.transform_row(
              mapping, "recA",
              {"文案": "content", "状态": "评估中", "互动量": 500, "点赞": 12, "收藏": 3, "评论数": 7},
          )
          assert note_a["tier"] == "爆", f"expected '爆' after numeric fallback, got {note_a.get('tier')!r}"
          assert note_a["tier_source"] == "数值推断", note_a.get("tier_source")
          print("  ✓ 评估中 + interactions>=爆 threshold promotes to 爆")

          # Case B: 评估中 + interactions=2000 (over 大爆) → must promote to 大爆
          note_b, _, _ = s.transform_row(
              mapping, "recB",
              {"文案": "c", "状态": "评估中", "互动量": 2000},
          )
          assert note_b["tier"] == "大爆", note_b.get("tier")
          print("  ✓ 评估中 + interactions>=大爆 threshold promotes to 大爆")

          # Case C: 评估中 + interactions=50 (below 爆) → stays 未知
          note_c, _, _ = s.transform_row(
              mapping, "recC",
              {"文案": "c", "状态": "评估中", "互动量": 50},
          )
          assert note_c["tier"] == "未知", note_c.get("tier")
          # tier_source should NOT be overwritten to 数值推断 since no promotion happened
          assert note_c.get("tier_source") != "数值推断", note_c.get("tier_source")
          print("  ✓ below-threshold 未知 stays 未知 (no false promotion)")

          # Case D: tier_source for an explicit 大爆 rule fire (not numeric fallback)
          note_d, _, _ = s.transform_row(
              mapping, "recD",
              {"文案": "c", "状态": "大爆", "互动量": 50},
          )
          assert note_d["tier"] == "大爆" and note_d["tier_source"] == "状态字段", note_d
          print("  ✓ explicit 状态字段 rule wins over numeric fallback")

          # Case E: metric-only cols (likes/saves/comments_count) belong in
          # metric_snapshots but NEVER in the notes payload (notes table has no
          # such columns; a future direct mapping would crash UPSERT). interactions
          # IS a valid notes column AND a metric_snapshot column, so it stays.
          assert "likes" not in note_a, "likes leaked into note payload"
          assert "saves" not in note_a, "saves leaked into note payload"
          assert "comments_count" not in note_a, "comments_count leaked into note payload"
          assert "interactions" in note_a, "interactions is a real notes column, should remain"
          assert metric_a["likes"] == 12 and metric_a["saves"] == 3 and metric_a["comments_count"] == 7
          assert metric_a["interactions"] == 500
          print("  ✓ metric-only cols stripped from note payload, retained in metric snapshot")

          print("\ntransform_row tier+metric: all 5 checks passed")
          PY
      - name: Supabase key validation self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          import os, sys
          import _common
          # Stub create_client so we exercise validation, not network.
          captured = []
          _common.create_client = lambda url, key, opts=None: captured.append(key) or "fake"

          os.environ['SUPABASE_URL'] = 'https://test.supabase.co'
          cases = [
              ("sb_secret_abc123def456", True, "new sb_secret_ format"),
              ("sb_publishable_abc123", False, "publishable rejected"),
              ("anon-key-12345", False, "'anon' substring rejected"),
              ("xx", False, "too short rejected"),
              ("eyJhbGciOiJIUzI1NiJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIn0.fake", True,
               "legacy JWT service_role"),
              ("eyJhbGciOiJIUzI1NiJ9.eyJyb2xlIjoiYW5vbiJ9.fake", False,
               "legacy JWT anon rejected"),
              ("some_future_opaque_" + "x" * 50, True,
               "unrecognized-but-long passes fallback"),
          ]
          failed = []
          for key, should_succeed, desc in cases:
              os.environ['SUPABASE_SERVICE_ROLE_KEY'] = key
              try:
                  _common.get_supabase_client()
                  ok = True
              except RuntimeError:
                  ok = False
              if ok != should_succeed:
                  failed.append(desc)
                  print(f"  FAIL {desc}: ok={ok} expected={should_succeed}")
              else:
                  print(f"  ok {desc}")
          if failed:
              sys.exit(f"{len(failed)} key validation case(s) failed")
          print(f"\nkey validation: {len(cases)}/{len(cases)} passed")
          PY
      - name: load_mapping tier_source whitelist self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          # Regression: tier_extraction.source previously fell back to "状态字段"
          # via .get(default) on any unknown value, silently dropping tier for
          # C-family projects whose source is "备注字段". Now validated up-front.
          import tempfile, os
          from pathlib import Path
          import yaml
          import _common

          with tempfile.TemporaryDirectory() as td:
              td_path = Path(td)
              _common._MAPPINGS_DIR = td_path

              def write(name, body):
                  (td_path / f"{name}.yaml").write_text(
                      yaml.safe_dump(body, allow_unicode=True), encoding="utf-8"
                  )

              # 1. valid source 状态字段
              write("p1", {
                  "project_id": "p1",
                  "field_mapping": {"a": "raw_content"},
                  "tier_extraction": {"source": "状态字段", "rules": []},
              })
              assert _common.load_mapping("p1")["project_id"] == "p1"
              print("  ✓ source=状态字段 accepted")

              # 2. valid source 备注字段
              write("p2", {
                  "project_id": "p2",
                  "field_mapping": {"a": "raw_content"},
                  "tier_extraction": {"source": "备注字段", "rules": []},
              })
              _common.load_mapping("p2")
              print("  ✓ source=备注字段 accepted")

              # 3. typo rejected with helpful message
              write("p3", {
                  "project_id": "p3",
                  "field_mapping": {"a": "raw_content"},
                  "tier_extraction": {"source": "状态字"},
              })
              try:
                  _common.load_mapping("p3")
                  raise AssertionError("typo should have been rejected")
              except ValueError as e:
                  assert "tier_extraction.source" in str(e), e
                  print("  ✓ source=状态字 (typo) rejected with helpful message")

              # 4. absent source → no validation (legacy mappings still load)
              write("p4", {
                  "project_id": "p4",
                  "field_mapping": {"a": "raw_content"},
              })
              _common.load_mapping("p4")
              print("  ✓ absent source ignored (legacy mappings still load)")

              # 5. tier_extraction without source key → no validation
              write("p5", {
                  "project_id": "p5",
                  "field_mapping": {"a": "raw_content"},
                  "tier_extraction": {"rules": []},
              })
              _common.load_mapping("p5")
              print("  ✓ tier_extraction without source key still loads")

          print("\ntier_source whitelist: all 5 checks passed")
          PY
      - name: write_essence_back payload size cap self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          # Regression: validate_essence only checks closed-set vocab membership;
          # inferred_audience_profile is free-form JSONB. A runaway LLM response
          # (esp. under output-truncation edge cases) could yield a multi-MB
          # payload that index-bloats every later SELECT. Hard cap pre-write.
          import annotate_essence_pass as a

          good_essence = {
              "emotional_lever": "焦虑撬动",
              "emotional_valence": "negative",
              "emotional_intensity": "high",
              "human_truth_archetype": ["健康焦虑"],
              "trend_dependencies": ["平台话术"],
              "content_format": "情感叙事",
          }

          # 1. Oversized audience profile → RuntimeError
          parsed_huge = {
              "essence": good_essence,
              "audience": {"runaway": "x" * 200_000},
          }
          try:
              a.write_essence_back(None, "N1", "fake", parsed_huge, None, dry_run=True)
              raise AssertionError("oversized payload should have been rejected")
          except RuntimeError as exc:
              assert "100000 cap" in str(exc) or "100000 bytes" in str(exc), exc
              print("  ✓ 200KB audience profile rejected with byte count")

          # 2. Normal-size payload passes the cap (dry_run avoids DB call)
          parsed_normal = {
              "essence": good_essence,
              "audience": {"primary_pain": "短句", "primary_aspiration": "更短"},
          }
          a.write_essence_back(None, "N2", "fake", parsed_normal, None, dry_run=True)
          print("  ✓ normal payload accepted under cap")

          print("\npayload size cap: 2/2 checks passed")
          PY
      - name: extract_negative isinstance feedback guard self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          # Regression: query_source_b's feedback filter called (fb or "").strip()
          # which crashes when fb is a list/dict (autowriter historical schema
          # quirk). Now uses isinstance(fb, str) — non-string feedback is skipped.
          import extract_negative_examples_from_autowriter as e

          class FakeBuilder:
              def __init__(self, rows): self.rows = rows
              def select(self, *a, **kw): return self
              def eq(self, *a, **kw): return self
              def range(self, *a, **kw): return self
              def execute(self):
                  class R: pass
                  r = R(); r.data = self.rows; return r

          class FakeSB:
              def __init__(self, rows): self.rows = rows
              def schema(self, *a, **kw): return self
              def table(self, *a, **kw): return FakeBuilder(self.rows)

          # Mixed feedback shapes: str ok, list/dict/int filtered without crash
          rows = [
              {"item_id": "i1", "version_num": 1, "ai_engine": "gpt", "feedback": None},
              {"item_id": "i1", "version_num": 2, "ai_engine": "gpt", "feedback": "需要更口语"},
              {"item_id": "i2", "version_num": 1, "ai_engine": "gpt", "feedback": None},
              {"item_id": "i2", "version_num": 2, "ai_engine": "gpt", "feedback": ["legacy", "list"]},
              {"item_id": "i3", "version_num": 1, "ai_engine": "gpt", "feedback": None},
              {"item_id": "i3", "version_num": 2, "ai_engine": "gpt", "feedback": 42},
              {"item_id": "i4", "version_num": 1, "ai_engine": "gpt", "feedback": "手动精修"},
              {"item_id": "i4", "version_num": 2, "ai_engine": "gpt", "feedback": "  "},
          ]
          result = e.query_source_b(FakeSB(rows))
          assert result == {"i1"}, f"expected only i1, got {result}"
          print("  ✓ str feedback matched; list/int feedback skipped without crash")
          print("  ✓ blank + '手动精修' feedback correctly filtered out")
          print("\nfeedback isinstance guard: passed")
          PY
      - name: sanshengliubu sync shape self-check (build_reference_sample ↔ preflight ↔ ssll v2 schema)
        working-directory: scripts
        run: |
          python - <<'PY'
          # The three sources of truth for the TV → ssll write must agree:
          #   1. build_reference_sample (keys produced)
          #   2. preflight_check (columns required at startup)
          #   3. sanshengliubu's actual reference_samples schema (v2)
          # If 1 and 2 drift, sync 跑得起来但写错位置;
          # if 1/2 and 3 drift, preflight 会爆 / INSERT 会爆.
          # This test pins 1 ↔ 2 and 1 ⊂ {ssll v2 columns + TV-injected key}.
          import sync_truth_vault_baokuan_to_sanshengliubu as s

          # Build a representative sample
          note = {
              "note_id": "TST_P_rec1",
              "project_id": "TST_P",
              "raw_content": "title line\nbody continues",
              "tier": "爆",
              "intent": "traffic",
              "publish_url": "https://example.com/x",
              "target_audience": ["20-29"],
              "hit_blue_keywords": ["k1"],
              "platform": "xiaohongshu",
              "projects": {"brand": "TST", "category": "保健品", "platform": "xiaohongshu"},
          }
          comments = [
              {"content": "评论1", "comment_role": "素人", "is_pinned": False},
              {"content": "评论2", "comment_role": "贴主", "is_pinned": True},
              {"content": None,   "comment_role": "路人", "is_pinned": False},
          ]
          sample = s.build_reference_sample(note, comments)
          built_keys = set(sample.keys())

          # The canonical v2 reference_samples columns (mirror of
          # sanshengliubu/db/schema.sql + migration 005) + the TV-added key.
          SSLL_V2_COLUMNS = {
              "id", "title", "source_type", "content_text", "analysis",
              "image_url", "tags", "post_title", "post_body",
              "cover_image_b64", "top_comments", "platform", "category",
              "ai_analysis", "quality_score", "created_by", "created_at",
          }
          TV_INJECTED = {"source_truth_vault_note_id"}
          allowed = SSLL_V2_COLUMNS | TV_INJECTED
          surprise = built_keys - allowed
          assert not surprise, (
              f"build_reference_sample writes columns not in ssll schema: {sorted(surprise)}. "
              "Check sanshengliubu/db/schema.sql + migrations/005 for the canonical set."
          )
          print(f"  ✓ {len(built_keys)} written keys all exist in ssll v2 schema")

          # preflight required ⊆ built — preflight would falsely flag a column
          # the script doesn't try to use otherwise. Extract from source.
          import re
          src = open(s.__file__).read()
          m = re.search(r"required = \(\s*((?:\"[^\"]*\"\s*)+)\)", src)
          assert m, "couldn't locate preflight required-cols literal"
          required_str = "".join(re.findall(r'"([^"]*)"', m.group(1)))
          preflight_cols = {c.strip() for c in required_str.split(",") if c.strip()}
          missing = preflight_cols - built_keys
          assert not missing, (
              f"preflight_check requires columns build_reference_sample doesn't write: "
              f"{sorted(missing)}. They'd be reported as 'present' on startup but"
              " never populated."
          )
          extra_in_build = built_keys - preflight_cols
          # built_keys can include columns preflight doesn't require (defensive),
          # but warn so we know about drift candidates.
          if extra_in_build:
              print(f"  ℹ build writes but preflight doesn't require: {sorted(extra_in_build)}")
          print(f"  ✓ preflight required cols ⊆ built keys ({len(preflight_cols)} required)")

          # top_comments shape: list of dicts with 'text' key (the live
          # vibe_rewriter contract; see retrieve_samples._shape_for_rewriter).
          assert isinstance(sample["top_comments"], list)
          assert all(isinstance(c, dict) and "text" in c for c in sample["top_comments"])
          assert len(sample["top_comments"]) == 2, "None-content comment should be filtered"
          assert sample["top_comments"][1]["pinned"] is True
          print("  ✓ top_comments shape matches vibe_rewriter contract")

          # post_title / post_body / source_truth_vault_note_id are the
          # downstream-critical fields. Make sure they're not silently empty.
          assert sample["post_title"], "post_title empty — vibe_rewriter shows '(no title)'"
          assert sample["post_body"], "post_body empty — vibe_rewriter has nothing to imitate"
          assert sample["source_truth_vault_note_id"] == "TST_P_rec1"
          assert sample["quality_score"] == 100
          print("  ✓ critical fields populated (post_title/post_body/quality_score/lineage)")
          print("\nsanshengliubu sync shape: all 4 checks passed")
          PY
      - name: essence vocab migration loader self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          import tempfile, yaml
          from pathlib import Path
          import migrate_essence_vocab as m

          def write_yaml(d):
              with tempfile.NamedTemporaryFile(mode="w", suffix=".yaml", delete=False) as f:
                  yaml.safe_dump(d, f, allow_unicode=True)
              return Path(f.name)

          # 1. Valid yaml loads
          p = write_yaml({
              "vocab_version_from": "v0.2",
              "vocab_version_to": "v0.3",
              "target_essence_vocab_version": "v0.3",
              "emotional_lever": {"焦虑撬动": "焦虑触发"},
              "human_truth_archetype": {"情感缺位": "情感真空"},
          })
          loaded = m.load_migration(p)
          assert loaded["emotional_lever"]["焦虑撬动"] == "焦虑触发"
          print("  ✓ valid yaml loads")

          # 2. Unknown column rejected
          p = write_yaml({
              "vocab_version_from": "v0.2", "vocab_version_to": "v0.3",
              "target_essence_vocab_version": "v0.3",
              "made_up_column": {"x": "y"},
          })
          try:
              m.load_migration(p)
              raise AssertionError("should have rejected")
          except ValueError as e:
              assert "unknown migration columns" in str(e)
              print("  ✓ unknown column rejected")

          # 3. Missing required keys
          p = write_yaml({"vocab_version_from": "v0.2"})
          try:
              m.load_migration(p)
              raise AssertionError("should have rejected")
          except ValueError as e:
              assert "missing required keys" in str(e)
              print("  ✓ missing keys rejected")

          # 4. Known scalar/array column split
          assert "emotional_lever" in m._SCALAR_COLS
          assert "human_truth_archetype" in m._ARRAY_COLS
          assert "content_format" in m._SCALAR_COLS
          assert "trend_dependencies" in m._ARRAY_COLS
          print("  ✓ scalar/array column buckets correct")
          print("\nmigrate_essence_vocab: 4 cases passed")
          PY
      - name: comment threading validator self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          # validate_threading 是 LLM 输出 → DB 写入 之间的唯一防线.
          # 必须拦下: unknown comment/parent ids, self-loops, cycles, dupes.
          import annotate_comment_threading as t
          allowed = {"a", "b", "c", "d"}

          # Valid tree
          ok = {"threading": [
              {"comment_id": "a", "parent_comment_id": None},
              {"comment_id": "b", "parent_comment_id": "a"},
              {"comment_id": "c", "parent_comment_id": "b"},
              {"comment_id": "d", "parent_comment_id": None},
          ]}
          assert t.validate_threading(ok, allowed) == []
          print("  ✓ valid tree passes")

          # Cycle
          errs = t.validate_threading({"threading": [
              {"comment_id": "a", "parent_comment_id": "b"},
              {"comment_id": "b", "parent_comment_id": "a"},
          ]}, allowed)
          assert any("cycle" in e for e in errs), errs
          print("  ✓ cycle detected")

          # Unknown comment_id
          errs = t.validate_threading({"threading": [
              {"comment_id": "zzz", "parent_comment_id": None},
          ]}, allowed)
          assert any("unknown comment_id" in e for e in errs)
          print("  ✓ unknown comment_id rejected")

          # Unknown parent
          errs = t.validate_threading({"threading": [
              {"comment_id": "a", "parent_comment_id": "zzz"},
          ]}, allowed)
          assert any("unknown parent_comment_id" in e for e in errs)
          print("  ✓ unknown parent rejected")

          # Self-loop
          errs = t.validate_threading({"threading": [
              {"comment_id": "a", "parent_comment_id": "a"},
          ]}, allowed)
          assert any("self-loop" in e for e in errs)
          print("  ✓ self-loop rejected")

          # Duplicate entry
          errs = t.validate_threading({"threading": [
              {"comment_id": "a", "parent_comment_id": None},
              {"comment_id": "a", "parent_comment_id": "b"},
          ]}, allowed)
          assert any("duplicate" in e for e in errs)
          print("  ✓ duplicate entry rejected")

          # Non-list
          errs = t.validate_threading({"threading": "not a list"}, allowed)
          assert errs == ["threading is not a list"]
          print("  ✓ non-list input rejected")

          print("\nvalidate_threading: 7/7 cases passed")
          PY
      - name: metric_snapshots hours_since_publish + window_label heuristic
        working-directory: scripts
        run: |
          python - <<'PY'
          # _derive_metric_window 把 publish_time → (hours_since_publish,
          # window_label) 的转换是后续做 Layer 4 时序分析的基础. 边界 case
          # 必须严丝合缝, 否则 metric_snapshots.window_label 会跟 CHECK
          # constraint 冲突或者落到 'ad_hoc' 兜底 (失去时序意义).
          from datetime import datetime, timedelta
          import sync_feishu_notes_to_truth_vault as s

          def at(delta):
              return (datetime.utcnow() - delta).isoformat(timespec="seconds")

          cases = [
              (at(timedelta(hours=1)),    "2h"),
              (at(timedelta(hours=12)),   "24h"),
              (at(timedelta(hours=48)),   "72h"),
              (at(timedelta(days=6)),     "7d"),
              (at(timedelta(days=13)),    "14d"),
              (at(timedelta(days=25)),    "30d"),
              (at(timedelta(days=60)),    "final"),
              (at(timedelta(days=400)),   "ad_hoc"),  # past 1y → ad_hoc
              (at(timedelta(hours=-1)),   "ad_hoc"),  # future → ad_hoc
              (None,                      "ad_hoc"),
              ("not a date",              "ad_hoc"),
          ]
          for pt, expected in cases:
              hrs, win = s._derive_metric_window(pt)
              assert win == expected, f"pt={pt!r} expected {expected}, got {win}"
          print(f"  ✓ all {len(cases)} hours-since-publish window cases pass")
          PY
      - name: recommend_tier_thresholds percentile helper
        working-directory: scripts
        run: |
          python - <<'PY'
          # 简单 percentile 函数, 不依赖 numpy. 必须能算对 P50 / P75 / P90 才能
          # 给 yaml 阈值建议; 算错的话 recommendations 全是噪音.
          import recommend_tier_thresholds as r

          # Known values
