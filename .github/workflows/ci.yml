name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python syntax + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scripts dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      - name: Compile all scripts
        run: |
          python -m py_compile \
            scripts/_common.py \
            scripts/sync_feishu_notes_to_truth_vault.py \
            scripts/sync_comments_from_raw_extra.py \
            scripts/annotate_essence_pass.py \
            scripts/sync_truth_vault_baokuan_to_sanshengliubu.py \
            scripts/sync_truth_vault_baokuan_to_autowriter_items.py \
            scripts/extract_negative_examples_from_autowriter.py \
            sanshengliubu-patches/import_truth_vault_baokuan.py
      - name: Comment parser unit tests
        working-directory: scripts
        run: |
          python - <<'PY'
          from sync_comments_from_raw_extra import parse_comment_text

          cases = [
              ("1. 用户A: 第一条\n2. 用户B: 第二条",
               [("素人", "第一条"), ("素人", "第二条")]),
              ("贴主: 谢谢姐妹\n素人小红: 好用吗",
               [("贴主", "谢谢姐妹"), ("素人", "好用吗")]),
              ("用户A | 第一条\n用户B | 第二条",
               [("素人", "第一条"), ("素人", "第二条")]),
              ("好用\n不好用",
               [("素人", "好用"), ("素人", "不好用")]),
              ("\n1.\n用户: 内容\n\n",
               [("素人", "内容")]),
              ("贴主:感谢",
               [("贴主", "感谢")]),
          ]
          failed = []
          for i, (text, expected) in enumerate(cases, 1):
              actual = list(parse_comment_text(text))
              if actual != expected:
                  failed.append((i, expected, actual))
                  print(f"  case {i}: FAIL\n    expected: {expected}\n    got:      {actual}")
              else:
                  print(f"  case {i}: ok")
          if failed:
              raise SystemExit(f"\n{len(failed)} parser test(s) failed")
          print(f"\n{len(cases)}/{len(cases)} passed")
          PY
      - name: Essence vocab validator self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          import annotate_essence_pass as a
          # Sanity: vocab sets are non-empty + match expected sizes from
          # docs/05-controlled-vocab.md v0.2.
          assert len(a.EMOTIONAL_LEVERS) == 12, f"levers: {len(a.EMOTIONAL_LEVERS)}"
          assert len(a.HUMAN_TRUTH_ARCHETYPES) == 19, f"archetypes: {len(a.HUMAN_TRUTH_ARCHETYPES)}"
          assert len(a.TREND_DEPENDENCIES) == 10, f"deps: {len(a.TREND_DEPENDENCIES)}"
          assert len(a.CONTENT_FORMATS) == 8, f"formats: {len(a.CONTENT_FORMATS)}"

          # Negative case: lever / valence mismatch
          bad = {"essence": {
              "emotional_lever": "焦虑撬动", "emotional_valence": "positive",
              "emotional_intensity": "high",
              "human_truth_archetype": ["健康焦虑"],
              "trend_dependencies": ["通用"],
              "content_format": "情感叙事",
          }}
          errs = a.validate_essence(bad)
          assert any("negative but valence=positive" in e for e in errs), errs

          # Negative case: 通用 must be exclusive
          bad2 = {"essence": {
              "emotional_lever": "焦虑撬动", "emotional_valence": "negative",
              "emotional_intensity": "high",
              "human_truth_archetype": ["健康焦虑"],
              "trend_dependencies": ["通用", "当代流行词"],
              "content_format": "情感叙事",
          }}
          errs = a.validate_essence(bad2)
          assert any("通用" in e for e in errs), errs

          # Positive case: clean valid record
          good = {"essence": {
              "emotional_lever": "焦虑撬动", "emotional_valence": "negative",
              "emotional_intensity": "high",
              "human_truth_archetype": ["健康焦虑", "育儿焦虑"],
              "trend_dependencies": ["平台话术"],
              "content_format": "情感叙事",
          }}
          assert a.validate_essence(good) == [], a.validate_essence(good)
          print("vocab validator self-check OK")
          PY
      - name: Essence annotator retry + failed_queue self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          import tempfile, json
          from pathlib import Path
          import annotate_essence_pass as a

          # 1. build_retry_prompt embeds errors and the prior raw response
          orig = "Original prompt"
          raw = '{"bad": "json"}'
          retry = a.build_retry_prompt(orig, raw, ["err_a", "err_b"])
          assert "err_a" in retry and "err_b" in retry and raw in retry
          print("  ✓ build_retry_prompt embeds context")

          # 2. _annotate_with_retry: validation fails first, succeeds second
          calls = []
          good_payload = ('{"essence":{"emotional_lever":"焦虑撬动",'
                          '"emotional_valence":"negative","emotional_intensity":"high",'
                          '"human_truth_archetype":["健康焦虑"],'
                          '"trend_dependencies":["平台话术"],"content_format":"情感叙事"},'
                          '"audience":{}}')
          bad_valence = ('{"essence":{"emotional_lever":"焦虑撬动",'
                         '"emotional_valence":"positive","emotional_intensity":"high",'
                         '"human_truth_archetype":["健康焦虑"],'
                         '"trend_dependencies":["平台话术"],"content_format":"情感叙事"},'
                         '"audience":{}}')

          a.call_claude = lambda p, m: (calls.append(p), bad_valence if len(calls) == 1 else good_payload)[1]
          parsed, errs, _, used_retry = a._annotate_with_retry("test", "fake")
          assert parsed is not None and parsed["essence"]["emotional_valence"] == "negative"
          assert len(calls) == 2
          assert used_retry is True, "used_retry should be True after a retry"
          print("  ✓ retry recovers after first-attempt validation failure")

          # 3. Both attempts fail → None
          calls.clear()
          a.call_claude = lambda p, m: (calls.append(p), bad_valence)[1]
          parsed, errs, _, used_retry = a._annotate_with_retry("test", "fake")
          assert parsed is None
          assert used_retry is True
          assert any("emotional_lever" in e or "valence" in e for e in errs), errs
          print("  ✓ returns None when both attempts fail")

          # 4. First attempt returns non-JSON → JSON parse failure → retry succeeds
          calls.clear()
          a.call_claude = lambda p, m: (calls.append(p), "not json" if len(calls) == 1 else good_payload)[1]
          parsed, errs, _, used_retry = a._annotate_with_retry("test", "fake")
          assert parsed is not None
          assert used_retry is True
          print("  ✓ retry recovers from initial JSON parse failure")

          # 4b. First attempt succeeds → used_retry False
          calls.clear()
          a.call_claude = lambda p, m: (calls.append(p), good_payload)[1]
          parsed, errs, _, used_retry = a._annotate_with_retry("test", "fake")
          assert parsed is not None
          assert used_retry is False, "used_retry should be False on a first-shot win"
          assert len(calls) == 1
          print("  ✓ first-shot success records used_retry=False")

          # 5. failed_queue writes valid JSONL
          with tempfile.NamedTemporaryFile(delete=False, suffix=".jsonl", mode="w") as f:
              p = Path(f.name)
          try:
              a._append_failed_queue(p, {"note_id": "N1"}, "P1", ["e1"], "raw")
              a._append_failed_queue(p, {"note_id": "N2"}, "P1", ["e2"], "raw2")
              lines = p.read_text(encoding="utf-8").strip().split("\n")
              assert len(lines) == 2
              r = json.loads(lines[0])
              assert r["note_id"] == "N1" and "attempted_at" in r
          finally:
              p.unlink(missing_ok=True)
          print("  ✓ failed_queue writes valid JSONL")
          print("\nannotate_essence retry + failed_queue: all 5 checks passed")
          PY
      - name: Essence annotator sub_direction classification self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          import annotate_essence_pass as a

          mapping = {
              "project_id": "TEST_P",
              "direction_decomposition": {
                  "营养保健代餐相关": {
                      "sub_directions": [
                          {"name": "营养代餐_健身减脂",
                           "detection_signal": "健身 / 减脂",
                           "content_format": "情感叙事",
                           "target_audience": ["年轻女性"],
                           "user_pain_point": "蛋白质摄入"},
                          {"name": "营养代餐_关心父母营养",
                           "detection_signal": "父母 / 老人饮食",
                           "content_format": "情感叙事",
                           "target_audience": ["子女"],
                           "user_pain_point": "父母饮食单一"},
                      ]
                  },
                  "糖尿病相关": {  # single direction (no sub_directions) → not applicable
                      "content_format": "情感叙事",
                      "target_audience": ["病患家属"],
                  }
              }
          }

          # 1. get_sub_directions_for_note returns the right shape
          note_multi = {"raw_extra": {"_direction_raw": "营养保健代餐相关"}}
          result = a.get_sub_directions_for_note(mapping, note_multi)
          assert result is not None, "should detect multi-sub_direction config"
          raw, subs = result
          assert raw == "营养保健代餐相关" and len(subs) == 2
          print("  ✓ get_sub_directions_for_note returns multi-direction config")

          # 2. Single-direction config returns None (deterministic lift done at sync time)
          note_single = {"raw_extra": {"_direction_raw": "糖尿病相关"}}
          assert a.get_sub_directions_for_note(mapping, note_single) is None
          print("  ✓ single-direction config bypasses LLM pass")

          # 3. Unknown direction returns None
          note_unknown = {"raw_extra": {"_direction_raw": "不存在的方向"}}
          assert a.get_sub_directions_for_note(mapping, note_unknown) is None
          print("  ✓ unknown direction bypasses LLM pass")

          # 4. classify_sub_direction validates against allowed set
          allowed = {"营养代餐_健身减脂", "营养代餐_关心父母营养"}
          a.call_claude = lambda p, m: '{"sub_direction": "营养代餐_健身减脂", "confidence": 0.9, "reasoning": "test"}'
          chosen, errs = a.classify_sub_direction("p", "m", allowed)
          assert chosen == "营养代餐_健身减脂" and errs == [], (chosen, errs)
          print("  ✓ classify_sub_direction accepts valid name")

          # 5. classify_sub_direction rejects name not in allowed set
          a.call_claude = lambda p, m: '{"sub_direction": "made_up_name", "confidence": 0.9, "reasoning": "x"}'
          chosen, errs = a.classify_sub_direction("p", "m", allowed)
          assert chosen is None
          assert any("not in allowed" in e for e in errs), errs
          print("  ✓ classify_sub_direction rejects name not in allowed set")

          # 6. apply_sub_direction_to_update lifts the right fields
          update = {"emotional_lever": "焦虑撬动"}  # existing essence field, preserved
          a.apply_sub_direction_to_update(update, subs, "营养代餐_关心父母营养")
          assert update["direction_subtype"] == "营养代餐_关心父母营养"
          assert update["target_audience"] == ["子女"]
          assert update["user_pain_point"] == "父母饮食单一"
          assert update["emotional_lever"] == "焦虑撬动"  # untouched
          print("  ✓ apply_sub_direction_to_update lifts the right fields")

          # 7. build_sub_direction_prompt embeds names + detection_signals
          prompt = a.build_sub_direction_prompt(
              "营养保健代餐相关", subs,
              {"title": "T", "body": "测试正文"}
          )
          assert "营养代餐_健身减脂" in prompt and "营养代餐_关心父母营养" in prompt
          assert "健身 / 减脂" in prompt and "父母 / 老人饮食" in prompt
          print("  ✓ build_sub_direction_prompt embeds all sub_directions")

          print("\nsub_direction classification: all 7 checks passed")
          PY
      - name: transform_row tier fallback + metric-only stripping self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          # Two regressions the new tests defend against:
          #   1. Item 2 — tier="未知" (mapped from "评估中") + interactions over
          #      threshold should auto-promote to 爆/大爆, not stay 未知.
          #   2. Item 3 — metric-only cols (likes/saves/shares/comments_count/
          #      search_rank/keyword_rank) must NOT end up in the notes payload,
          #      they only belong in metric_snapshots.
          import sync_feishu_notes_to_truth_vault as s

          mapping = {
              "project_id": "TEST_P",
              "platform": "xiaohongshu",
              "field_mapping": {
                  "文案":   "raw_content",
                  "互动量": "interactions",
                  "点赞":   "likes",
                  "收藏":   "saves",
                  "评论数": "comments_count",
                  "状态":   "_status_raw",
              },
              "tier_thresholds": {"爆": 100, "大爆": 1000},
              "tier_extraction": {
                  "source": "状态字段",
                  "rules": [
                      {"match_contains": ["大爆"], "tier": "大爆"},
                      {"match_contains": ["评估中"], "tier": "未知"},
                  ],
              },
          }

          # Case A: 评估中 + interactions=500 (over 爆 threshold) → must promote to 爆.
          # The old code only fired numeric fallback when tier was None; "评估中"
          # mapped to "未知" so it stayed there forever.
          note_a, metric_a, _ = s.transform_row(
              mapping, "recA",
              {"文案": "content", "状态": "评估中", "互动量": 500, "点赞": 12, "收藏": 3, "评论数": 7},
          )
          assert note_a["tier"] == "爆", f"expected '爆' after numeric fallback, got {note_a.get('tier')!r}"
          assert note_a["tier_source"] == "数值推断", note_a.get("tier_source")
          print("  ✓ 评估中 + interactions>=爆 threshold promotes to 爆")

          # Case B: 评估中 + interactions=2000 (over 大爆) → must promote to 大爆
          note_b, _, _ = s.transform_row(
              mapping, "recB",
              {"文案": "c", "状态": "评估中", "互动量": 2000},
          )
          assert note_b["tier"] == "大爆", note_b.get("tier")
          print("  ✓ 评估中 + interactions>=大爆 threshold promotes to 大爆")

          # Case C: 评估中 + interactions=50 (below 爆) → stays 未知
          note_c, _, _ = s.transform_row(
              mapping, "recC",
              {"文案": "c", "状态": "评估中", "互动量": 50},
          )
          assert note_c["tier"] == "未知", note_c.get("tier")
          # tier_source should NOT be overwritten to 数值推断 since no promotion happened
          assert note_c.get("tier_source") != "数值推断", note_c.get("tier_source")
          print("  ✓ below-threshold 未知 stays 未知 (no false promotion)")

          # Case D: tier_source for an explicit 大爆 rule fire (not numeric fallback)
          note_d, _, _ = s.transform_row(
              mapping, "recD",
              {"文案": "c", "状态": "大爆", "互动量": 50},
          )
          assert note_d["tier"] == "大爆" and note_d["tier_source"] == "状态字段", note_d
          print("  ✓ explicit 状态字段 rule wins over numeric fallback")

          # Case E: metric-only cols (likes/saves/comments_count) belong in
          # metric_snapshots but NEVER in the notes payload (notes table has no
          # such columns; a future direct mapping would crash UPSERT). interactions
          # IS a valid notes column AND a metric_snapshot column, so it stays.
          assert "likes" not in note_a, "likes leaked into note payload"
          assert "saves" not in note_a, "saves leaked into note payload"
          assert "comments_count" not in note_a, "comments_count leaked into note payload"
          assert "interactions" in note_a, "interactions is a real notes column, should remain"
          assert metric_a["likes"] == 12 and metric_a["saves"] == 3 and metric_a["comments_count"] == 7
          assert metric_a["interactions"] == 500
          print("  ✓ metric-only cols stripped from note payload, retained in metric snapshot")

          print("\ntransform_row tier+metric: all 5 checks passed")
          PY
      - name: Supabase key validation self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          import os, sys
          import _common
          # Stub create_client so we exercise validation, not network.
          captured = []
          _common.create_client = lambda url, key, opts: captured.append(key) or "fake"

          os.environ['SUPABASE_URL'] = 'https://test.supabase.co'
          cases = [
              ("sb_secret_abc123def456", True, "new sb_secret_ format"),
              ("sb_publishable_abc123", False, "publishable rejected"),
              ("anon-key-12345", False, "'anon' substring rejected"),
              ("xx", False, "too short rejected"),
              ("eyJhbGciOiJIUzI1NiJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIn0.fake", True,
               "legacy JWT service_role"),
              ("eyJhbGciOiJIUzI1NiJ9.eyJyb2xlIjoiYW5vbiJ9.fake", False,
               "legacy JWT anon rejected"),
              ("some_future_opaque_" + "x" * 50, True,
               "unrecognized-but-long passes fallback"),
          ]
          failed = []
          for key, should_succeed, desc in cases:
              os.environ['SUPABASE_SERVICE_ROLE_KEY'] = key
              try:
                  _common.get_supabase_client()
                  ok = True
              except RuntimeError:
                  ok = False
              if ok != should_succeed:
                  failed.append(desc)
                  print(f"  FAIL {desc}: ok={ok} expected={should_succeed}")
              else:
                  print(f"  ok {desc}")
          if failed:
              sys.exit(f"{len(failed)} key validation case(s) failed")
          print(f"\nkey validation: {len(cases)}/{len(cases)} passed")
          PY
      - name: Autowriter dup-error detection self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          # _is_duplicate_error decides whether to fall into the dedup-recovery
          # branch in insert_synced_item. Misclassifying any error here would
          # either (a) hide a real schema problem behind silent dedup, or
          # (b) crash the sync on a real duplicate. The substring scan is
          # intentionally permissive because supabase-py wraps PostgREST
          # errors in several shapes; tests pin down the exact shapes we
          # rely on.
          import sync_truth_vault_baokuan_to_autowriter_items as s

          class _E(Exception):
              def __init__(self, msg, code=None):
                  super().__init__(msg)
                  if code: self.code = code

          # Yes-paths (must return True)
          assert s._is_duplicate_error(_E("duplicate key value violates unique constraint"))
          assert s._is_duplicate_error(_E("err 23505 something"))
          assert s._is_duplicate_error(_E("any text", code="23505"))
          print("  ✓ detects 23505 substring + .code")

          # No-paths (must return False) — important: an FK violation or
          # permission denied must NOT be silently swallowed as "dedup"
          assert not s._is_duplicate_error(_E("permission denied"))
          assert not s._is_duplicate_error(_E("violates foreign key constraint", code="23503"))
          assert not s._is_duplicate_error(_E("connection refused"))
          assert not s._is_duplicate_error(_E("the word duplicate appears but not in 23505 context", code="42P01"))
          print("  ✓ does not false-positive on FK / permission / network errors")
          print("\nautowriter dup detection: 2/2 groups passed")
          PY

  sql:
    name: SQL apply (Postgres 16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tv_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
      PGDATABASE: tv_ci
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Apply truth_vault schema
        run: psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_2.sql
      - name: Apply truth_vault schema again (idempotency)
        run: psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_2.sql
      - name: Sanity-check triggers + CHECK constraints
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          -- category CHECK rejects unknown values
          DO $$
          BEGIN
              BEGIN
                  INSERT INTO truth_vault.projects (project_id, brand, product, category)
                  VALUES ('CI_BAD', 'b', 'p', '医美');
                  RAISE EXCEPTION 'category CHECK did not reject bad value';
              EXCEPTION WHEN check_violation THEN
                  RAISE NOTICE 'category CHECK OK (rejected as expected)';
              END;
          END $$;

          -- Insert valid project + note
          INSERT INTO truth_vault.projects (project_id, brand, product, category)
          VALUES ('CI_OK', 'b', 'p', '保健品');
          INSERT INTO truth_vault.notes (note_id, project_id, raw_content)
          VALUES ('CI_OK_r1', 'CI_OK', 'content');

          -- ingested_at preservation trigger
          UPDATE truth_vault.notes SET ingested_at = '2000-01-01', body = 'x'
          WHERE note_id = 'CI_OK_r1';
          DO $$
          DECLARE ts TIMESTAMP;
          BEGIN
              SELECT ingested_at INTO ts FROM truth_vault.notes WHERE note_id='CI_OK_r1';
              IF ts < '2025-01-01' THEN
                  RAISE EXCEPTION 'preserve_ingested_at trigger failed: ts=%', ts;
              END IF;
              RAISE NOTICE 'preserve_ingested_at trigger OK';
          END $$;

          -- era_tag generation
          INSERT INTO truth_vault.notes (note_id, project_id, raw_content, publish_time)
          VALUES ('CI_OK_r2', 'CI_OK', 'rc', '2026-04-15');
          DO $$
          DECLARE et TEXT;
          BEGIN
              SELECT era_tag INTO et FROM truth_vault.notes WHERE note_id='CI_OK_r2';
              IF et != '2026 Q2' THEN
                  RAISE EXCEPTION 'era_tag wrong: %', et;
              END IF;
              RAISE NOTICE 'era_tag trigger OK';
          END $$;

          -- quarantine UNIQUE (project_id, feishu_record_id, reason): a second
          -- insert with the same triple should be rejected. The Python wrapper
          -- (quarantine_record) uses upsert(ignore_duplicates=True) so reruns
          -- of sync_feishu on a still-broken record don't accumulate rows.
          INSERT INTO truth_vault.undeclared_fields_quarantine
              (project_id, feishu_record_id, raw_row, undeclared_field_names, reason)
          VALUES ('CI_OK', 'rec_q1', '{}', ARRAY['x'], 'undeclared_fields');
          DO $$
          BEGIN
              BEGIN
                  INSERT INTO truth_vault.undeclared_fields_quarantine
                      (project_id, feishu_record_id, raw_row, undeclared_field_names, reason)
                  VALUES ('CI_OK', 'rec_q1', '{}', ARRAY['y'], 'undeclared_fields');
                  RAISE EXCEPTION 'quarantine UNIQUE did not reject duplicate';
              EXCEPTION WHEN unique_violation THEN
                  RAISE NOTICE 'quarantine UNIQUE OK (rejected duplicate as expected)';
              END;
          END $$;
          -- Different `reason` for the same record IS allowed (one row per
          -- distinct failure mode)
          INSERT INTO truth_vault.undeclared_fields_quarantine
              (project_id, feishu_record_id, raw_row, undeclared_field_names, reason)
          VALUES ('CI_OK', 'rec_q1', '{}', ARRAY['z'], 'missing_required:raw_content');
          DO $$
          DECLARE n INT;
          BEGIN
              SELECT COUNT(*) INTO n FROM truth_vault.undeclared_fields_quarantine
              WHERE project_id='CI_OK' AND feishu_record_id='rec_q1';
              IF n != 2 THEN
                  RAISE EXCEPTION 'expected 2 quarantine rows (different reasons), got %', n;
              END IF;
              RAISE NOTICE 'quarantine allows distinct reasons (% rows for same record)', n;
          END $$;

          -- v_top_performing_accounts threshold + bao_rate
          INSERT INTO truth_vault.accounts (account_id) VALUES ('acc_ci');
          INSERT INTO truth_vault.notes (note_id, project_id, account_id, raw_content, tier) VALUES
              ('CI_OK_r3', 'CI_OK', 'acc_ci', 'c3', '爆'),
              ('CI_OK_r4', 'CI_OK', 'acc_ci', 'c4', '大爆'),
              ('CI_OK_r5', 'CI_OK', 'acc_ci', 'c5', '爆'),
              ('CI_OK_r6', 'CI_OK', 'acc_ci', 'c6', '趴'),
              ('CI_OK_r7', 'CI_OK', 'acc_ci', 'c7', '趴');
          DO $$
          DECLARE rate FLOAT;
          BEGIN
              SELECT personal_bao_rate INTO rate
              FROM truth_vault.v_top_performing_accounts WHERE account_id='acc_ci';
              IF rate IS NULL OR ABS(rate - 0.6) > 0.0001 THEN
                  RAISE EXCEPTION 'v_top_performing_accounts wrong rate: %', rate;
              END IF;
              RAISE NOTICE 'v_top_performing_accounts OK (rate=%)', rate;
          END $$;
          SQL
      - name: Apply integration migration packs
        run: |
          # Bare-bones stand-ins so the migrations have tables to operate on.
          # truth_vault.projects already exists from the schema apply above
          # (different schema, so no name conflict with the to-be-moved
          # autowriter tables in public).
          psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE TABLE IF NOT EXISTS public.reference_samples (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              title TEXT, content TEXT, ai_analysis JSONB
          );
          -- All 5 autowriter tables in public, so migration 001 has
          -- something to move into the autowriter schema. Production has
          -- richer columns; this is a minimum viable footprint.
          CREATE TABLE IF NOT EXISTS public.projects (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid()
          );
          CREATE TABLE IF NOT EXISTS public.batches (
              id UUID PRIMARY KEY, project_id UUID
          );
          CREATE TABLE IF NOT EXISTS public.items (
              id UUID PRIMARY KEY, status TEXT, example_label TEXT
          );
          CREATE TABLE IF NOT EXISTS public.versions (
              id UUID PRIMARY KEY, item_id UUID
          );
          CREATE TABLE IF NOT EXISTS public.memories (
              id UUID PRIMARY KEY
          );
          SQL
          psql -v ON_ERROR_STOP=1 -f sanshengliubu-patches/001_add_source_tv_note_id.sql
          psql -v ON_ERROR_STOP=1 -f autowriter-migrations/001_create_autowriter_schema.sql
          psql -v ON_ERROR_STOP=1 -f autowriter-migrations/002_add_external_source.sql
          psql -v ON_ERROR_STOP=1 -f autowriter-migrations/003_add_example_label_proposal.sql
          # Verify migration 001 actually moved all 5 tables
          psql -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE n INT;
          BEGIN
              SELECT COUNT(*) INTO n FROM information_schema.tables
              WHERE table_schema = 'autowriter'
              AND table_name IN ('projects','batches','items','versions','memories');
              IF n != 5 THEN
                  RAISE EXCEPTION 'autowriter migration 001 incomplete: only % of 5 tables moved', n;
              END IF;
              RAISE NOTICE 'autowriter schema migration OK (% tables)', n;
          END $$;
          SQL
      - name: Re-run all migrations (idempotency)
        run: |
          psql -v ON_ERROR_STOP=1 -f sanshengliubu-patches/001_add_source_tv_note_id.sql
          psql -v ON_ERROR_STOP=1 -f autowriter-migrations/002_add_external_source.sql
          psql -v ON_ERROR_STOP=1 -f autowriter-migrations/003_add_example_label_proposal.sql
      - name: Apply cross-schema views
        run: |
          # Cross-schema views (notes_v1_2_cross_schema_views.sql) require
          # sanshengliubu's public.outputs / public.pipeline_runs and
          # autowriter.items / autowriter.versions to exist. We already have
          # autowriter tables from migration 001 above; add the two missing
          # ssll stubs so the view file can apply. Catches view-SQL syntax
          # regressions (column rename, JOIN drift, etc).
          psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE TABLE IF NOT EXISTS public.pipeline_runs (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              project_id TEXT,
              completed_at TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS public.outputs (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              run_id UUID,
              version TEXT
          );
          -- autowriter.versions / autowriter.items already created by
          -- migration 001 + 002. Migration 002 adds external_source,
          -- but the view references ai_engine — add it if missing.
          ALTER TABLE autowriter.versions
              ADD COLUMN IF NOT EXISTS item_id UUID,
              ADD COLUMN IF NOT EXISTS ai_engine TEXT;
          ALTER TABLE autowriter.items
              ADD COLUMN IF NOT EXISTS best_version_id UUID;
          SQL
          psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_2_cross_schema_views.sql
          # Idempotency: views use CREATE OR REPLACE so re-apply is safe
          psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_2_cross_schema_views.sql
          # Sanity: both views exist and have the expected columns
          psql -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
              IF NOT EXISTS (SELECT 1 FROM information_schema.views
                             WHERE table_schema = 'truth_vault'
                             AND table_name = 'v_prompt_performance') THEN
                  RAISE EXCEPTION 'v_prompt_performance view missing';
              END IF;
              IF NOT EXISTS (SELECT 1 FROM information_schema.views
                             WHERE table_schema = 'truth_vault'
                             AND table_name = 'v_model_comparison') THEN
                  RAISE EXCEPTION 'v_model_comparison view missing';
              END IF;
              RAISE NOTICE 'cross-schema views applied OK';
          END $$;
          -- Verify both views are queryable (catches column drift)
          SELECT COUNT(*) FROM truth_vault.v_prompt_performance;
          SELECT COUNT(*) FROM truth_vault.v_model_comparison;
          SQL

  yaml:
    name: Mapping yaml lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Validate every mappings/*.yaml parses + has required keys
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          import yaml

          REQUIRED = {"project_id", "field_mapping"}
          rc = 0
          for f in Path("mappings").glob("*.yaml"):
              if f.name == "_template.yaml":
                  continue
              try:
                  data = yaml.safe_load(f.read_text(encoding="utf-8"))
              except yaml.YAMLError as exc:
                  print(f"{f}: YAML parse error: {exc}")
                  rc = 1
                  continue
              missing = REQUIRED - set(data.keys())
              if missing:
                  print(f"{f}: missing required keys: {missing}")
                  rc = 1
              if data.get("project_id") != f.stem:
                  print(f"{f}: project_id={data.get('project_id')!r} doesn't match filename")
                  rc = 1
              print(f"{f}: OK")
          sys.exit(rc)
          PY
