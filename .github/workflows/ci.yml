              ('CI_v_confirmed_numeric', 'CI_OK', 'F', '大爆', '人工补录',
                NOW()::TIMESTAMP - INTERVAL '14 days', '共鸣释放');
          DO $$
          DECLARE n INT; max_score FLOAT; numeric_present BOOLEAN; old_present BOOLEAN;
