      - name: Autowriter injection diversity filter self-check (D-036)
        working-directory: scripts
        run: |
          python - <<'PY'
          # Diversity filter must:
          #   1. Prefer first-occurrence of each lever (top-score wins per lever)
          #   2. Fill remaining slots by score order if max_n not yet reached
          #   3. Degrade gracefully to plain top-N when essence unannotated
          #   4. Handle fewer-than-cap candidates without error
          import sync_truth_vault_baokuan_to_autowriter_items as s

          # Case A: 7 candidates, 3 distinct levers (焦虑/造梦/共鸣), max 5
          # Expected: n1(焦虑) n3(造梦) n5(共鸣) n2(焦虑) n4(焦虑)
          # n6/n7 don't make it (lever already saturated and quota full)
          A = [
              {"note_id": "n1", "emotional_lever": "焦虑撬动", "injection_score": 1.9},
              {"note_id": "n2", "emotional_lever": "焦虑撬动", "injection_score": 1.8},
              {"note_id": "n3", "emotional_lever": "造梦投射", "injection_score": 1.7},
              {"note_id": "n4", "emotional_lever": "焦虑撬动", "injection_score": 1.6},
              {"note_id": "n5", "emotional_lever": "共鸣释放", "injection_score": 1.5},
              {"note_id": "n6", "emotional_lever": "焦虑撬动", "injection_score": 1.4},
              {"note_id": "n7", "emotional_lever": "造梦投射", "injection_score": 1.3},
          ]
          got = [c["note_id"] for c in s.apply_diversity_filter(A, max_n=5, min_levers=3)]
          assert got == ["n1", "n3", "n5", "n2", "n4"], got
          print("  ✓ diverse pool: 3 distinct levers picked first, then fill by score")

          # Case B: essence unannotated everywhere → plain top-N by score
          B = [{"note_id": f"u{i}", "emotional_lever": None,
                "injection_score": 2.0 - i*0.1} for i in range(8)]
          got = [c["note_id"] for c in s.apply_diversity_filter(B, max_n=5)]
          assert got == ["u0", "u1", "u2", "u3", "u4"], got
          print("  ✓ unannotated essence: clean degrade to score-DESC top N")

          # Case C: dominant single lever — should still pick all from same lever
          # rather than refuse to sync. Diversity is advisory, not blocking.
          C = [{"note_id": f"d{i}", "emotional_lever": "焦虑撬动",
                "injection_score": 2.0 - i*0.1} for i in range(6)]
          got = [c["note_id"] for c in s.apply_diversity_filter(C, max_n=5, min_levers=3)]
          assert got == ["d0", "d1", "d2", "d3", "d4"], got
          print("  ✓ saturated lever pool: doesn't refuse to sync (advisory only)")

          # Case D: fewer candidates than cap
          D = [{"note_id": "x1", "emotional_lever": "焦虑撬动", "injection_score": 1.5},
               {"note_id": "x2", "emotional_lever": "造梦投射", "injection_score": 1.0}]
          got = s.apply_diversity_filter(D, max_n=5)
          assert len(got) == 2 and {c["note_id"] for c in got} == {"x1", "x2"}
          print("  ✓ handles fewer candidates than cap (no padding, no error)")

          # Case E: empty
          assert s.apply_diversity_filter([], max_n=5) == []
          print("  ✓ empty input → empty output")
          print("\napply_diversity_filter: 5/5 cases passed")
          PY
      - name: Per-project quota self-check (2026-05-22 audit P1-2)
        working-directory: scripts
        run: |
          python - <<'PY'
          # Per-project quota: each aw_project should get its own diversity
          # pass + cap; high-volume projects must not starve low-volume ones.
          # The selection logic lives in main(), but the pure-Python grouping
          # + per-project filter is what matters; we replicate the bucket
          # step here to verify.
          import sync_truth_vault_baokuan_to_autowriter_items as s

          # 3 projects, very uneven volumes; project A has all top scores
          candidates = []
          for i in range(20):  # A: 20 candidates, scores 2.0..0.1
              candidates.append({
                  "note_id": f"a{i}", "aw_project_id": "A",
                  "emotional_lever": ["焦虑", "造梦", "共鸣"][i % 3],
                  "injection_score": 2.0 - i*0.1,
              })
          for i in range(3):   # B: 3 candidates, lower scores
              candidates.append({
                  "note_id": f"b{i}", "aw_project_id": "B",
                  "emotional_lever": ["焦虑", "造梦"][i % 2],
                  "injection_score": 0.9 - i*0.1,
              })
          for i in range(1):   # C: 1 candidate
              candidates.append({
                  "note_id": f"c{i}", "aw_project_id": "C",
                  "emotional_lever": "焦虑",
                  "injection_score": 0.85,
              })

          # Simulate main()'s per-project bucketing + per-project diversity
          by_project = {}
          for c in candidates:
              by_project.setdefault(c["aw_project_id"], []).append(c)
          selected = []
          for proj, pool in by_project.items():
              pool.sort(key=lambda r: r["injection_score"], reverse=True)
              picks = s.apply_diversity_filter(pool, max_n=5)
              selected.extend(picks)

          # Old global-cap would have given: 5 from A only (since A has all
          # the top scores). New per-project gives: 5 from A + 3 from B + 1 from C = 9
          picked_per_project = {}
          for c in selected:
              picked_per_project[c["aw_project_id"]] = picked_per_project.get(c["aw_project_id"], 0) + 1
          assert picked_per_project == {"A": 5, "B": 3, "C": 1}, picked_per_project
          print(f"  ✓ per-project picks: {picked_per_project} (no starvation)")

          # Each project's picks must respect diversity (when possible)
          a_picks = [c for c in selected if c["aw_project_id"] == "A"]
          a_levers = {c["emotional_lever"] for c in a_picks}
          assert a_levers == {"焦虑", "造梦", "共鸣"}, a_levers
          print(f"  ✓ project A's 5 picks cover all 3 levers ({a_levers})")

          # Global cap round-robin: cap=4 should bring it down fairly
          # (e.g., 2 from A, 1 from B, 1 from C, NOT 4 from A and 0 elsewhere)
          # Replicating the round-robin logic from main()
          GLOBAL_CAP = 4
          selected_ids = {c["note_id"] for c in selected}
          per_proj_queues = [
              [c for c in sorted(by_project[p], key=lambda r: r["injection_score"], reverse=True)
               if c["note_id"] in selected_ids]
              for p in by_project
          ]
          rr = []
          idx = 0
          while len(rr) < GLOBAL_CAP:
              advanced = False
              for q in per_proj_queues:
                  if idx < len(q) and len(rr) < GLOBAL_CAP:
                      rr.append(q[idx])
                      advanced = True
              if not advanced:
                  break
              idx += 1
          rr_per_proj = {}
          for c in rr:
              rr_per_proj[c["aw_project_id"]] = rr_per_proj.get(c["aw_project_id"], 0) + 1
          # Round-robin order: A0, B0, C0, A1 → {A:2, B:1, C:1}
          assert rr_per_proj == {"A": 2, "B": 1, "C": 1}, rr_per_proj
          print(f"  ✓ global cap round-robin: {rr_per_proj} (fair across projects)")
          print("\nper-project quota: 3/3 cases passed")
          PY
      - name: Autowriter dup-error detection self-check
        working-directory: scripts
        run: |
          python - <<'PY'
          # _is_duplicate_error decides whether to fall into the dedup-recovery
          # branch in insert_synced_item. Misclassifying any error here would
          # either (a) hide a real schema problem behind silent dedup, or
          # (b) crash the sync on a real duplicate. The substring scan is
          # intentionally permissive because supabase-py wraps PostgREST
          # errors in several shapes; tests pin down the exact shapes we
          # rely on.
          import sync_truth_vault_baokuan_to_autowriter_items as s

          class _E(Exception):
              def __init__(self, msg, code=None):
                  super().__init__(msg)
                  if code: self.code = code

          # Yes-paths (must return True)
          assert s._is_duplicate_error(_E("duplicate key value violates unique constraint"))
          assert s._is_duplicate_error(_E("err 23505 something"))
          assert s._is_duplicate_error(_E("any text", code="23505"))
          print("  ✓ detects 23505 substring + .code")

          # No-paths (must return False) — important: an FK violation or
          # permission denied must NOT be silently swallowed as "dedup"
          assert not s._is_duplicate_error(_E("permission denied"))
          assert not s._is_duplicate_error(_E("violates foreign key constraint", code="23503"))
          assert not s._is_duplicate_error(_E("connection refused"))
          # "duplicate" word alone (not in "duplicate key value violates" phrase)
          # must NOT trigger the dedup path. The 42P01 code is "table does not
          # exist" — a real failure we'd want to surface, not swallow.
          assert not s._is_duplicate_error(_E("relation does not exist; duplicate references unsupported", code="42P01"))
          print("  ✓ does not false-positive on FK / permission / network errors")
          print("\nautowriter dup detection: 2/2 groups passed")
          PY

  sql:
    name: SQL apply (Postgres 16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tv_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
      PGDATABASE: tv_ci
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Apply truth_vault schema
        run: psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_2.sql
      - name: Apply truth_vault schema again (idempotency)
        run: psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_2.sql
      - name: Apply v1.3 reference tier migration (+ idempotency)
        # notes_v1_3 must apply on top of v1_2: widens tier CHECK to add '参考'
        # and CREATE OR REPLACE-s the injection / flywheel views. DROP CONSTRAINT
        # IF EXISTS + CREATE OR REPLACE → a second apply must be a clean no-op.
        run: |
          psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_3_reference_tier.sql
          psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_3_reference_tier.sql
      - name: Apply tier discrepancy view (+ idempotency)
        run: |
          psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_2_tier_discrepancy_view.sql
          psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_2_tier_discrepancy_view.sql
      - name: Sanity-check v1.3 (参考 tier accepted + reference cols + discrepancy view)
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          -- '参考' must be a legal tier now; pre-1.3 CHECK would reject this insert.
          INSERT INTO truth_vault.projects (project_id, brand, product, category)
          VALUES ('CI_REF', 'b', 'p', '保健品');
          INSERT INTO truth_vault.notes (note_id, project_id, raw_content, tier)
          VALUES ('CI_REF_r1', 'CI_REF', 'content', '参考');
          DO $$
          BEGIN
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns
                             WHERE table_schema='truth_vault'
                               AND table_name='v_flywheel_sync_status'
                               AND column_name='total_reference') THEN
