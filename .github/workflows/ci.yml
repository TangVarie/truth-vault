                                  'sanshengliubu-patches/001 not applied';
              END IF;
              IF NOT is_unique THEN
                  RAISE EXCEPTION 'reference_samples tv_note index exists but '
                                  'indisunique=false — apply '
                                  'sanshengliubu-patches/003_strengthen_tv_note_id_unique.sql';
              END IF;
              RAISE NOTICE 'reference_samples tv_note partial UNIQUE present';
          END $$;

          -- Concurrency smoke test: a second INSERT with the same
          -- source_truth_vault_note_id must raise SQLSTATE 23505.
          -- NOTE: public.reference_samples.id is UUID (not TEXT) in the
          -- ssll v2 schema — gen_random_uuid() goes in directly, no ::TEXT cast.
          DO $$
          BEGIN
              BEGIN
                  INSERT INTO public.reference_samples (
                      id, title, source_type, content_text, post_title,
                      post_body, top_comments, platform, category, ai_analysis,
                      quality_score, tags, source_truth_vault_note_id, created_at
                  ) VALUES (
                      gen_random_uuid(),
                      'TV smoke title (dup)', 'pack', '正文', 'TV smoke title (dup)',
                      '正文', '[]'::jsonb, '小红书', NULL,
                      '{"_truth_vault_note_id":"NUC_phase1_rec1"}'::jsonb,
                      100, ARRAY['truth_vault_sync','爆']::TEXT[],
                      'NUC_phase1_rec1', NOW()
                  );
                  RAISE EXCEPTION 'TV → ssll concurrency smoke FAIL: duplicate INSERT was accepted';
              EXCEPTION WHEN unique_violation THEN
                  RAISE NOTICE 'TV → ssll concurrency smoke OK: duplicate INSERT rejected with 23505';
              END;
          END $$;
          SQL
          # Verify migration 001 actually moved all 5 tables
          psql -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE n INT;
          BEGIN
              SELECT COUNT(*) INTO n FROM information_schema.tables
              WHERE table_schema = 'autowriter'
              AND table_name IN ('projects','batches','items','versions','memories');
              IF n != 5 THEN
                  RAISE EXCEPTION 'autowriter migration 001 incomplete: only % of 5 tables moved', n;
              END IF;
              RAISE NOTICE 'autowriter schema migration OK (% tables)', n;
          END $$;
          SQL
      - name: Re-run all migrations (idempotency)
        run: |
          psql -v ON_ERROR_STOP=1 -f sanshengliubu-patches/001_add_source_tv_note_id.sql
          psql -v ON_ERROR_STOP=1 -f autowriter-migrations/002_add_external_source.sql
          psql -v ON_ERROR_STOP=1 -f autowriter-migrations/003_add_example_label_proposal.sql
      - name: Apply cross-schema views
        run: |
          # Cross-schema views (notes_v1_2_cross_schema_views.sql) require
          # sanshengliubu's public.outputs / public.pipeline_runs and
          # autowriter.items / autowriter.versions to exist. We already have
          # autowriter tables from migration 001 above; add the two missing
          # ssll stubs so the view file can apply. Catches view-SQL syntax
          # regressions (column rename, JOIN drift, etc).
          psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE TABLE IF NOT EXISTS public.pipeline_runs (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              project_id TEXT,
              completed_at TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS public.outputs (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              run_id UUID,
              version TEXT
          );
          -- autowriter.versions / autowriter.items already created by
          -- migration 001 + 002. The minimum stub in earlier steps only
          -- has (id, status, example_label) + (id, item_id) — but the
          -- cross-schema views reference more columns (ai_engine on
          -- versions for v_model_comparison; batch_id + created_at on
          -- items for v_autowriter_positive_pool_saturation). Add via
          -- ALTER ... IF NOT EXISTS so production schema (which has
          -- these natively) is untouched.
          ALTER TABLE autowriter.versions
              ADD COLUMN IF NOT EXISTS item_id UUID,
              ADD COLUMN IF NOT EXISTS ai_engine TEXT;
          ALTER TABLE autowriter.items
              ADD COLUMN IF NOT EXISTS best_version_id UUID,
              ADD COLUMN IF NOT EXISTS batch_id UUID,
              ADD COLUMN IF NOT EXISTS created_at TIMESTAMPTZ DEFAULT NOW();
          SQL
          psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_2_cross_schema_views.sql
          # Idempotency: views use CREATE OR REPLACE so re-apply is safe
          psql -v ON_ERROR_STOP=1 -f schemas/notes_v1_2_cross_schema_views.sql
          # Sanity: both views exist and have the expected columns
          psql -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
              IF NOT EXISTS (SELECT 1 FROM information_schema.views
                             WHERE table_schema = 'truth_vault'
                             AND table_name = 'v_prompt_performance') THEN
                  RAISE EXCEPTION 'v_prompt_performance view missing';
              END IF;
              IF NOT EXISTS (SELECT 1 FROM information_schema.views
                             WHERE table_schema = 'truth_vault'
                             AND table_name = 'v_model_comparison') THEN
                  RAISE EXCEPTION 'v_model_comparison view missing';
              END IF;
              IF NOT EXISTS (SELECT 1 FROM information_schema.views
                             WHERE table_schema = 'truth_vault'
                             AND table_name = 'v_autowriter_positive_pool_saturation') THEN
                  RAISE EXCEPTION 'v_autowriter_positive_pool_saturation view missing';
              END IF;
              RAISE NOTICE 'cross-schema views applied OK';
          END $$;
          -- Verify all three views are queryable (catches column drift)
          SELECT COUNT(*) FROM truth_vault.v_prompt_performance;
          SELECT COUNT(*) FROM truth_vault.v_model_comparison;
          SELECT COUNT(*) FROM truth_vault.v_autowriter_positive_pool_saturation;

          -- Seed saturation scenario: 5 TV-synced positive items in one
          -- autowriter project, 3 of them share the same emotional_lever.
          -- Expected: dominant_lever_ratio = 0.6 (3/5 dominant).
          INSERT INTO truth_vault.projects (project_id, brand, product, category)
              VALUES ('CI_SAT', 'b', 'p', '保健品');
          INSERT INTO truth_vault.notes (note_id, project_id, raw_content, tier, emotional_lever) VALUES
              ('CI_SAT_n1', 'CI_SAT', 'c1', '爆', '焦虑撬动'),
              ('CI_SAT_n2', 'CI_SAT', 'c2', '爆', '焦虑撬动'),
              ('CI_SAT_n3', 'CI_SAT', 'c3', '爆', '焦虑撬动'),
              ('CI_SAT_n4', 'CI_SAT', 'c4', '爆', '造梦投射'),
              ('CI_SAT_n5', 'CI_SAT', 'c5', '爆', '共鸣释放');
          INSERT INTO autowriter.batches (id, project_id) VALUES
              ('00000000-0000-0000-0000-000000c10001'::uuid,
               '00000000-0000-0000-0000-000000aaaa01'::uuid);
          INSERT INTO autowriter.items
              (id, batch_id, example_label, external_source, external_source_id, created_at)
          VALUES
              (gen_random_uuid(), '00000000-0000-0000-0000-000000c10001'::uuid,
               'positive', 'truth_vault', 'CI_SAT_n1', NOW() - INTERVAL '1 hour'),
              (gen_random_uuid(), '00000000-0000-0000-0000-000000c10001'::uuid,
               'positive', 'truth_vault', 'CI_SAT_n2', NOW() - INTERVAL '2 hour'),
              (gen_random_uuid(), '00000000-0000-0000-0000-000000c10001'::uuid,
               'positive', 'truth_vault', 'CI_SAT_n3', NOW() - INTERVAL '3 hour'),
              (gen_random_uuid(), '00000000-0000-0000-0000-000000c10001'::uuid,
               'positive', 'truth_vault', 'CI_SAT_n4', NOW() - INTERVAL '4 hour'),
              (gen_random_uuid(), '00000000-0000-0000-0000-000000c10001'::uuid,
               'positive', 'truth_vault', 'CI_SAT_n5', NOW() - INTERVAL '5 hour');
          DO $$
          DECLARE r RECORD;
          BEGIN
              SELECT * INTO r FROM truth_vault.v_autowriter_positive_pool_saturation
                  WHERE aw_project_id = '00000000-0000-0000-0000-000000aaaa01'::uuid;
              IF r.active_positive_count != 5 THEN
                  RAISE EXCEPTION 'expected 5 active positives, got %', r.active_positive_count;
              END IF;
              IF r.distinct_lever_count != 3 THEN
                  RAISE EXCEPTION 'expected 3 distinct levers, got %', r.distinct_lever_count;
              END IF;
              IF r.top_lever_count != 3 THEN
                  RAISE EXCEPTION 'expected top_lever_count=3 (焦虑撬动 x3), got %', r.top_lever_count;
              END IF;
              IF ABS(r.dominant_lever_ratio - 0.60) > 0.01 THEN
                  RAISE EXCEPTION 'expected dominant_lever_ratio=0.60, got %', r.dominant_lever_ratio;
              END IF;
              RAISE NOTICE 'v_autowriter_positive_pool_saturation OK (active=5, distinct=3, top=3, ratio=%)',
                  r.dominant_lever_ratio;
          END $$;
          SQL

  yaml:
    name: Mapping yaml lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Validate every mappings/*.yaml parses + has required keys
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          import yaml

          REQUIRED = {"project_id", "field_mapping"}
          rc = 0
          for f in Path("mappings").glob("*.yaml"):
              if f.name == "_template.yaml":
                  continue
              try:
                  data = yaml.safe_load(f.read_text(encoding="utf-8"))
              except yaml.YAMLError as exc:
                  print(f"{f}: YAML parse error: {exc}")
                  rc = 1
                  continue
              missing = REQUIRED - set(data.keys())
              if missing:
                  print(f"{f}: missing required keys: {missing}")
                  rc = 1
              if data.get("project_id") != f.stem:
                  print(f"{f}: project_id={data.get('project_id')!r} doesn't match filename")
                  rc = 1
              print(f"{f}: OK")
          sys.exit(rc)
          PY
