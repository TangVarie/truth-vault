name: Daily TV sync

# 2026-06-01 (Session #15): schedule 已启用 (每日 02:00 UTC = 10:00 北京时间).
# secrets 已配齐, 手动 dry-run / 真跑验证过 (通道1 已通, MF65 已同步).
# ⚠️ GitHub 定时任务只从【默认分支】的 workflow 文件触发 —— 所以本改动必须
#    合并进默认分支 (main) 后 cron 才真正开始跑; 停在 feature 分支上不会触发.
#
# (历史) 原启用步骤, 留作配置参考:
#   1. Settings → Secrets and variables → Actions → New repository secret 配齐:
#        SUPABASE_URL
#        SUPABASE_SERVICE_ROLE_KEY
#        FEISHU_APP_ID, FEISHU_APP_SECRET
#        ANTHROPIC_API_KEY   (annotation pass 用; 可选)
#        ESSENCE_MODEL       (默认 claude-sonnet-4-6; 可选)
#        (注: AUTOWRITER_SYNC_USER_ID / AUTOWRITER_INJECTION_* 随通道2 push
#         退役已移除 — D-038; 详见下方 steps 中退役注释)
#   2. 在下方 on: 块里把 schedule 那段取消注释
#   3. 第一次手动 Run workflow 验证一遍 (dry_run=true)
#
# 失败告警 (2026-05-22 audit 改进):
#   - 每个 sync 步骤跑完后会汇总失败计数; 任何一个 sync 失败都让 workflow
#     退出非零 → GitHub 默认给 repo owner / 触发者发邮件 (无需额外 webhook).
#   - 老版本用 "|| warning" 吞错误, 表面上 workflow 永远成功, cron 静默漂移.
#     新版用 continue-on-error: true + 最后 "Fail job on any sync failure"
#     step 聚合, 保证失败可见.

on:
  workflow_dispatch:
    inputs:
      project:
        description: "只跑某个项目 (如 WTG_phase1). 留空 = 跑 mappings/ 下全部项目"
        type: string
        default: ""
      dry_run:
        description: "Dry run (no writes to Supabase)"
        type: boolean
        default: false
      skip_essence:
        description: "Skip Mode A essence annotation (saves Anthropic spend)"
        type: boolean
        default: false
  schedule:
    # 02:00 UTC = 10:00 北京时间. 飞书表通常这之前已经填好昨日数据.
    - cron: '0 2 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # 中转站 / 第三方网关地址(同 autowriter)。配了它 essence/curate 的 LLM 调用才走中转站;
      # 空则走官方 endpoint。注: 现在没配 ANTHROPIC_API_KEY → essence/curate 直接 skip。
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ESSENCE_MODEL: ${{ secrets.ESSENCE_MODEL }}
      # 只跑某项目 (workflow_dispatch 的 project 输入); 空 = 全部. cron 触发时为空.
      PROJECT_FILTER: ${{ github.event.inputs.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (from lockfile for reproducibility)
        run: |
          if [ -f scripts/requirements.lock ]; then
            pip install -r scripts/requirements.lock
          else
            pip install -r scripts/requirements.txt
          fi

      - name: Check secrets are configured (gracefully skip if not)
        id: check
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_URL/KEY not configured; skipping sync."
            echo "See .github/workflows/daily-sync.yml header for setup steps."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: feishu → TV (per project from mappings/)
        id: feishu_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true' && env.FEISHU_APP_ID != ''
        working-directory: scripts
        run: |
          DRYRUN=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRYRUN="--dry-run"
          fail_count=0
          for f in ../mappings/*.yaml; do
            p=$(basename "$f" .yaml)
            [ "$p" = "_template" ] && continue
            [ -n "$PROJECT_FILTER" ] && [ "$p" != "$PROJECT_FILTER" ] && continue
            echo "─── feishu → TV · project=$p ───"
            python sync_feishu_notes_to_truth_vault.py "$p" $DRYRUN || {
              echo "::error::feishu sync failed for $p"
              fail_count=$((fail_count + 1))
            }
          done
          if [ $fail_count -gt 0 ]; then
            echo "::error::feishu sync failed for $fail_count project(s)"
            exit 1
          fi

      - name: comments raw_extra → truth_vault.comments
        id: comments_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true'
        working-directory: scripts
        run: |
          DRYRUN=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRYRUN="--dry-run"
          fail_count=0
          for f in ../mappings/*.yaml; do
            p=$(basename "$f" .yaml)
            [ "$p" = "_template" ] && continue
            [ -n "$PROJECT_FILTER" ] && [ "$p" != "$PROJECT_FILTER" ] && continue
            echo "─── comments parse · project=$p ───"
            python sync_comments_from_raw_extra.py "$p" $DRYRUN || {
              echo "::error::comments parse failed for $p"
              fail_count=$((fail_count + 1))
            }
          done
          if [ $fail_count -gt 0 ]; then
            echo "::error::comments parse failed for $fail_count project(s)"
            exit 1
          fi

      - name: essence + sub_direction annotation (Mode A, D-028 独立 pass)
        id: essence_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true' && env.ANTHROPIC_API_KEY != '' && github.event.inputs.skip_essence != 'true'
        working-directory: scripts
        run: |
          DRYRUN=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRYRUN="--dry-run"
          fail_count=0
          for f in ../mappings/*.yaml; do
            p=$(basename "$f" .yaml)
            [ "$p" = "_template" ] && continue
            [ -n "$PROJECT_FILTER" ] && [ "$p" != "$PROJECT_FILTER" ] && continue
            echo "─── essence annotate · project=$p ───"
            # --limit 50 per run as a soft budget cap;
            # NUC pilot estimate ≈ ¥200-400 for full 1102 rows.
            python annotate_essence_pass.py "$p" --limit 50 $DRYRUN || {
              echo "::error::essence annotation failed for $p"
              fail_count=$((fail_count + 1))
            }
          done
          if [ $fail_count -gt 0 ]; then
            echo "::error::essence annotation failed for $fail_count project(s)"
            exit 1
          fi

      - name: 策展 flywheel 经验卡 (pull 馆员书架, D-038 / docs/14)
        id: curate_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true' && env.ANTHROPIC_API_KEY != '' && github.event.inputs.skip_essence != 'true'
        working-directory: scripts
        run: |
          DRYRUN=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRYRUN="--dry-run"
          # 尊重 workflow 的 project 输入: 定向跑某项目时只策展该项目, 不在别的项目上花
          # Anthropic 预算(与 feishu/essence 等 per-project 步骤一致; PR#30 review r3338862087)。
          PROJ=""
          [ -n "$PROJECT_FILTER" ] && PROJ="--project $PROJECT_FILTER"
          # 把合格爆款(爆/大爆/参考, 非 synthetic)提炼成"经验卡", 喂 pull 模型的 LLM 馆员书架。
          # 读 v_flywheel_lesson_cards 里 is_curated=false 的卡; 库小时一轮跑完(--limit 50 软上限)。
          # 复用 skip_essence flag(同属 LLM 花费, 一起跳)。书架空时 0 卡, no-op。
          python curate_flywheel_lessons.py --limit 50 $PROJ $DRYRUN

      - name: TV 爆款 → sanshengliubu.reference_samples (通道 1)
        id: ssll_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true'
        working-directory: scripts
        run: |
          DRYRUN=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRYRUN="--dry-run"
          python sync_truth_vault_baokuan_to_sanshengliubu.py $DRYRUN

      # 通道2 push 已退役 (D-038 / docs/15): TV 不再写 autowriter.items;
      # aw 改为 write-time 主动 pull 馆员书架 (见上 curate_sync 步骤策展经验卡)。
      # 历史脚本 sync_truth_vault_baokuan_to_autowriter_items.py 保留在 repo 备查。

      - name: autowriter 人工审稿决定 → truth_vault.prepublish_evaluations
        id: prepublish_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true'
        working-directory: scripts
        run: |
          DRYRUN=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRYRUN="--dry-run"
          # 2026-05-22 audit P1/P2-4: 默认 365 天窗口足够日 cron 抓到迟到决策;
          # autowriter.items 没有 updated_at 列, 我们按 created_at 滚动取. 月度
          # 可以跑一次 --since-days 0 全扫补漏 (在另一个 workflow / 手动 cron).
          python sync_autowriter_decisions_to_prepublish.py $DRYRUN

      - name: positive pool 饱和度检查 (advisory, 不 fail)
        if: steps.check.outputs.skip != 'true' && always()
        working-directory: scripts
        run: |
          python check_positive_saturation.py || true  # advisory only

      - name: Show flywheel status (truth_vault.v_flywheel_sync_status)
        if: steps.check.outputs.skip != 'true' && always()
        working-directory: scripts
        run: |
          python - <<'PY' || true
          from _common import get_supabase_client
          sb = get_supabase_client()
          res = sb.schema("truth_vault").table("v_flywheel_sync_status").select("*").execute()
          for r in (res.data or []):
              print(
                f"  {r['project_id']:<16} "
                f"baokuan={r['total_baokuan']:>3} | "
                f"→ssll {r['synced_to_ssll']:>3}/{r['pending_ssll_sync']:>3} | "
                f"ref={r['total_reference']:>3}(→ssll {r['synced_reference_to_ssll']}/{r['pending_reference_ssll']}) | "
                f"last_ssll={r['last_baokuan_sync_to_ssll_at']}"
              )
          PY

      # ── 失败聚合: 任一 sync step 失败 → 整 workflow 失败 → GitHub 默认发邮件 ──
      # 2026-05-22 audit 改进: 老版本每个 sync 步骤用 "|| echo warning" 吞错误,
      # workflow 永远 success, cron 静默漂移到 ssll/aw 没数据也没告警. 现在每个
      # sync step 用 continue-on-error: true 单独跑完, 最后这步聚合所有 outcome,
      # 任一 failure 就 exit 1, GitHub 自动给 repo owner / actor 发邮件.
      - name: Fail job on any sync failure (so GitHub notifies)
        if: steps.check.outputs.skip != 'true' && always()
        run: |
          failed_steps=""
          if [ "${{ steps.feishu_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps feishu_sync"
          fi
          if [ "${{ steps.comments_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps comments_sync"
          fi
          if [ "${{ steps.essence_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps essence_sync"
          fi
          if [ "${{ steps.curate_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps curate_sync"
          fi
          if [ "${{ steps.ssll_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps ssll_sync"
          fi
          if [ "${{ steps.prepublish_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps prepublish_sync"
          fi
          if [ -n "$failed_steps" ]; then
            echo "::error::Daily TV sync failed steps:$failed_steps"
            echo "Repo owner will get an email via GitHub default notifications."
            echo "Investigate: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            exit 1
          fi
          echo "✅ All sync steps succeeded."
