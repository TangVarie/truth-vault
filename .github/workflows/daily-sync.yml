name: Daily TV sync

# 2026-06-01 (Session #15): schedule 已启用 (每日 02:00 UTC = 10:00 北京时间).
# secrets 已配齐, 手动 dry-run / 真跑验证过 (通道1 已通, MF65 已同步).
# ⚠️ GitHub 定时任务只从【默认分支】的 workflow 文件触发 —— 所以本改动必须
#    合并进默认分支 (main) 后 cron 才真正开始跑; 停在 feature 分支上不会触发.
#
# (历史) 原启用步骤, 留作配置参考:
#   1. Settings → Secrets and variables → Actions → New repository secret 配齐:
#        SUPABASE_URL
#        SUPABASE_SERVICE_ROLE_KEY
#        FEISHU_APP_ID, FEISHU_APP_SECRET
#        WORKER_URL, WORKER_API_KEY   (essence/curate 搬 Railway worker 后用; D-038/docs/17 §7-D)
#        (注: ANTHROPIC_API_KEY/BASE_URL/ESSENCE_MODEL 随 essence/curate 搬 Railway 已从 GitHub 移除)
#        (注: AUTOWRITER_SYNC_USER_ID / AUTOWRITER_INJECTION_* 随通道2 push
#         退役已移除 — D-038; 详见下方 steps 中退役注释)
#   2. 在下方 on: 块里把 schedule 那段取消注释
#   3. 第一次手动 Run workflow 验证一遍 (dry_run=true)
#
# 失败告警 (2026-05-22 audit 改进):
#   - 每个 sync 步骤跑完后会汇总失败计数; 任何一个 sync 失败都让 workflow
#     退出非零 → GitHub 默认给 repo owner / 触发者发邮件 (无需额外 webhook).
#   - 老版本用 "|| warning" 吞错误, 表面上 workflow 永远成功, cron 静默漂移.
#     新版用 continue-on-error: true + 最后 "Fail job on any sync failure"
#     step 聚合, 保证失败可见.

on:
  workflow_dispatch:
    inputs:
      project:
        description: "只跑某个项目 (如 WTG_phase1). 留空 = 跑 mappings/ 下全部项目"
        type: string
        default: ""
      dry_run:
        description: "Dry run (no writes to Supabase)"
        type: boolean
        default: false
      skip_essence:
        description: "Skip Mode A essence annotation (saves Anthropic spend)"
        type: boolean
        default: false
  schedule:
    # 02:00 UTC = 10:00 北京时间. 飞书表通常这之前已经填好昨日数据.
    - cron: '0 2 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      # essence/curate 的 LLM 调用已搬到 Railway worker(GitHub 海外 runner 连不上中转站;
      # D-038 / docs/17 §7-D)。GitHub 这边只【触发】worker —— 不再需要 ANTHROPIC_*/ESSENCE_MODEL。
      # 未配 WORKER_URL → essence/curate 优雅跳过(不再因 GitHub 连不上网关而红)。
      WORKER_URL: ${{ secrets.WORKER_URL }}
      WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
      # essence 每日上限/项目。essence 步骤会【循环多个 ≤15 的子批】凑够这个数 —— 因为单个
      # worker 请求受 Railway 边缘【~5min 超时】约束,每请求最多 ~15 条(≈3.5min;>15 会 502)。
      # 想每天标更多就在 repo Variables 调大 WORKER_LIMIT(如 50 = 每天每项目最多 50,内部
      # 自动拆成 ≤15 的多轮)。curate 待办是爆款数量级、远少,每请求封顶 15 不随之放大。
      WORKER_LIMIT: ${{ vars.WORKER_LIMIT || '15' }}
      # 只跑某项目 (workflow_dispatch 的 project 输入); 空 = 全部. cron 触发时为空.
      PROJECT_FILTER: ${{ github.event.inputs.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (from lockfile for reproducibility)
        run: |
          if [ -f scripts/requirements.lock ]; then
            pip install -r scripts/requirements.lock
          else
            pip install -r scripts/requirements.txt
          fi

      - name: Check secrets are configured (gracefully skip if not)
        id: check
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_URL/KEY not configured; skipping sync."
            echo "See .github/workflows/daily-sync.yml header for setup steps."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: feishu → TV (per project from mappings/)
        id: feishu_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true' && env.FEISHU_APP_ID != ''
        working-directory: scripts
        run: |
          DRYRUN=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRYRUN="--dry-run"
          fail_count=0
          for f in ../mappings/*.yaml; do
            p=$(basename "$f" .yaml)
            [ "$p" = "_template" ] && continue
            [ -n "$PROJECT_FILTER" ] && [ "$p" != "$PROJECT_FILTER" ] && continue
            echo "─── feishu → TV · project=$p ───"
            python sync_feishu_notes_to_truth_vault.py "$p" $DRYRUN || {
              echo "::error::feishu sync failed for $p"
              fail_count=$((fail_count + 1))
            }
          done
          if [ $fail_count -gt 0 ]; then
            echo "::error::feishu sync failed for $fail_count project(s)"
            exit 1
          fi

      - name: comments raw_extra → truth_vault.comments
        id: comments_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true'
        working-directory: scripts
        run: |
          DRYRUN=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRYRUN="--dry-run"
          fail_count=0
          for f in ../mappings/*.yaml; do
            p=$(basename "$f" .yaml)
            [ "$p" = "_template" ] && continue
            [ -n "$PROJECT_FILTER" ] && [ "$p" != "$PROJECT_FILTER" ] && continue
            echo "─── comments parse · project=$p ───"
            python sync_comments_from_raw_extra.py "$p" $DRYRUN || {
              echo "::error::comments parse failed for $p"
              fail_count=$((fail_count + 1))
            }
          done
          if [ $fail_count -gt 0 ]; then
            echo "::error::comments parse failed for $fail_count project(s)"
            exit 1
          fi

      - name: essence + sub_direction annotation (Mode A, D-028) via Railway worker
        id: essence_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true' && env.WORKER_URL != '' && github.event.inputs.skip_essence != 'true'
        working-directory: scripts
        run: |
          # LLM 调用搬到 Railway worker(GitHub 连不上中转站, D-038/docs/17 §7-D);这里只 curl 触发。
          # ⚠️ 单个 worker 请求受 Railway 边缘【~5min 超时】。带 sub_direction(D-014, 如 NUC)的项目
          #    每条要【两次】LLM 调用(essence + 子方向分类)→ 单请求耗时翻倍, 15 条会撞 5min → 502
          #    (NUC_1 首灌实测: 15 条/请求的第 3 批超时, body 非 JSON)。故每请求封顶 8 留余量,
          #    不够靠多轮循环凑 WORKER_LIMIT。标注幂等(essence_annotated_at IS NULL 续作), 标完即停。
          ESS_REQ_MAX=8    # 单请求硬上限。含 sub_direction 的项目每条 2 次 LLM, 8 条≈4min<5min;
                           # 不带 sub_dir 的本可更大, 取保守统一值避免按项目分叉(够用, 靠循环补)。
          DRY=false
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY=true
          # 区分 worker 调用失败是【瞬时】(够到了 worker 但慢/被边缘掐断 → 幂等下轮续, 只告警)
          # 还是【系统性】(配置/连通/鉴权坏 → 该红, 否则 curation 静默瘫痪还报绿; codex PR#65 review:
          # 原来 `|| code=000` 把超时和 URL拼错/DNS失败/拒连混为一谈, 都只告警 = 漏掉真问题)。
          # 据 curl 退出码区分(只有【够到 worker 但中断】算瞬时; 【没够到/配置坏】判系统性):
          worker_fail_kind() {  # $1=curl_rc $2=http_code → echo transient|systemic
            case "$1" in
              28|52|56|18) echo transient; return ;;  # 28超时 52空回复 56接收重置 18传输不全 = 够到但中断
              0) : ;;                                  # curl 本身成功, 看 http_code
              *) echo systemic; return ;;             # 6 DNS / 7 拒连 / 3 URL格式 / 35,60 SSL = 没够到/配置坏
            esac
            case "$2" in 502|503|504) echo transient ;; *) echo systemic ;; esac  # 网关超时=瞬时; 4xx 等=系统性
          }
          fail_count=0
          for f in ../mappings/*.yaml; do
            p=$(basename "$f" .yaml)
            [ "$p" = "_template" ] && continue
            [ -n "$PROJECT_FILTER" ] && [ "$p" != "$PROJECT_FILTER" ] && continue
            echo "─── essence annotate (worker) · project=$p · 每日上限=$WORKER_LIMIT · 每请求≤$ESS_REQ_MAX ───"
            budget=$WORKER_LIMIT
            ok_batches=0   # 本项目本轮成功的子批数(>0 = 本轮已有进展)
            while [ "$budget" -gt 0 ]; do
              rem=$(python count_unannotated_essence.py "$p" 2>/dev/null || echo "?")
              [ "$rem" = "0" ] && { echo "  ✅ $p essence 已全部标完"; break; }
              batch=$ESS_REQ_MAX; [ "$batch" -gt "$budget" ] && batch=$budget
              # 捕获 curl 退出码(不再一律 code=000 掩盖)—— 用于区分超时 vs 配置/连通错(PR#65 review)。
              if code=$(curl -sS -w '%{http_code}' -o /tmp/ess.json --max-time 900 \
                -X POST "${WORKER_URL%/}/annotate-essence" \
                -H "X-Worker-Key: $WORKER_API_KEY" -H 'content-type: application/json' \
                -d "{\"project\":\"$p\",\"limit\":${batch},\"dry_run\":$DRY}"); then
                curl_rc=0
              else
                curl_rc=$?; code=000   # curl 失败时 http_code 不可靠, 记 000; 真因看 curl_rc
              fi
              # ⚠️ `|| echo false` 必须有: 502/超时时 body 是 HTML(非 JSON), jq 解析失败退出码 5,
              #    在 bash -e 下会【直接崩整步】(绕过下方 502 判断, NUC_1 首灌实测 exit 5)。守卫后降级 ok=false。
              ok=$(jq -r '.ok // false' /tmp/ess.json 2>/dev/null || echo false)
              echo "  HTTP $code · ok=$ok · $(jq -r '.stdout_tail // ""' /tmp/ess.json 2>/dev/null | grep -o 'Done:.*' | tail -1)"
              if [ "$code" != "200" ] || [ "$ok" != "true" ]; then
                jq -r '.stderr_tail // ""' /tmp/ess.json 2>/dev/null | tail -8
                # 容忍策略(标注幂等: essence_annotated_at IS NULL, 下轮 cron 续标):
                # - 瞬时(curl 超时/边缘掐断 · 502/503/504 网关)= worker 可能已提交 → 只告警不拖红, 下轮续。
                # - 系统性但【本轮已标过批】(ok_batches>0)= 多半单条抽风/部分失败、有进展 → 也只告警。
                # - 系统性且【第一批就失败】(ok_batches=0)= 配置/连通/鉴权坏 或 全军覆没 → 判红排查。
                kind=$(worker_fail_kind "$curl_rc" "$code")
                if [ "$kind" = "transient" ]; then
                  echo "::warning::essence $p 瞬时失败(curl_rc=$curl_rc HTTP $code ok=$ok), 幂等下轮 cron 续标, 不拖红。"
                elif [ "$ok_batches" -gt 0 ]; then
                  echo "::warning::essence $p 子批失败(curl_rc=$curl_rc HTTP $code ok=$ok), 本轮已标 $ok_batches 批; 余量下轮续标, 不拖红。"
                else
                  echo "::error::essence $p 首批即系统性失败(curl_rc=$curl_rc HTTP $code ok=$ok) —— 配置/连通/鉴权 或 全军覆没, 需排查。"
                  fail_count=$((fail_count + 1))
                fi
                break
              fi
              ok_batches=$((ok_batches + 1))
              budget=$((budget - batch))
            done
          done
          if [ $fail_count -gt 0 ]; then
            echo "::error::essence annotation failed for $fail_count project(s)"
            exit 1
          fi

      - name: 策展 flywheel 经验卡 (pull 馆员书架, D-038 / docs/14) via Railway worker
        id: curate_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true' && env.WORKER_URL != '' && github.event.inputs.skip_essence != 'true'
        working-directory: scripts
        run: |
          # 把合格爆款(爆/大爆/参考, 非 synthetic)提炼成"经验卡", 喂 pull 模型的 LLM 馆员书架。
          # LLM 调用在 Railway worker 上跑(GitHub 连不上中转站);这里只 curl 触发。
          # 尊重 workflow 的 project 输入: 定向跑某项目时只策展该项目(PR#30 review r3338862087)。
          # 复用 skip_essence flag(同属 LLM 花费, 一起跳)。书架空时 0 卡, no-op。
          # curate 同走 Railway 边缘(~5min/请求)。curate 待办是【爆款数】量级(远少于笔记),
          # 15/天足够;单请求 >~15 张同样会撞 5min 超时。故每请求封顶 15、不随 WORKER_LIMIT 放大
          # (避免 502);待办多时下轮 cron 续(is_curated=false 幂等)。
          CUR_LIMIT=$WORKER_LIMIT; [ "$CUR_LIMIT" -gt 15 ] && CUR_LIMIT=15
          DRY=false
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY=true
          # 同 essence 步: 区分瞬时(够到 worker 但慢/掐断)vs 系统性(配置/连通/鉴权坏)。PR#65 review。
          worker_fail_kind() {  # $1=curl_rc $2=http_code → echo transient|systemic
            case "$1" in
              28|52|56|18) echo transient; return ;;  # 28超时 52空回复 56接收重置 18传输不全 = 够到但中断
              0) : ;;                                  # curl 本身成功, 看 http_code
              *) echo systemic; return ;;             # 6 DNS / 7 拒连 / 3 URL格式 / 35,60 SSL = 没够到/配置坏
            esac
            case "$2" in 502|503|504) echo transient ;; *) echo systemic ;; esac
          }
          BODY="{\"limit\":${CUR_LIMIT},\"dry_run\":$DRY"
          [ -n "$PROJECT_FILTER" ] && BODY="$BODY,\"project\":\"$PROJECT_FILTER\""
          BODY="$BODY}"
          echo "─── curate (worker) ───"
          # 捕获 curl 退出码(不再一律 code=000 掩盖)—— 区分超时 vs 配置/连通错(PR#65 review)。
          if code=$(curl -sS -w '%{http_code}' -o /tmp/cur.json --max-time 900 \
            -X POST "${WORKER_URL%/}/curate" \
            -H "X-Worker-Key: $WORKER_API_KEY" -H 'content-type: application/json' \
            -d "$BODY"); then
            curl_rc=0
          else
            curl_rc=$?; code=000   # curl 失败时 http_code 不可靠, 记 000; 真因看 curl_rc
          fi
          # || echo false: 防 502/超时的非 JSON body 让 jq(退出码 5)在 bash -e 下崩整步。
          ok=$(jq -r '.ok // false' /tmp/cur.json 2>/dev/null || echo false)
          echo "HTTP $code · curl_rc=$curl_rc · ok=$ok · returncode=$(jq -r '.returncode // "?"' /tmp/cur.json 2>/dev/null || echo '?')"
          jq -r '.stdout_tail // ""' /tmp/cur.json 2>/dev/null | tail -8
          if [ "$code" != "200" ] || [ "$ok" != "true" ]; then
            jq -r '.stderr_tail // ""' /tmp/cur.json 2>/dev/null | tail -8
            # curate 是 best-effort 富集、幂等(is_curated=false 下轮续)。同 essence 的容忍:
            # - 瞬时(curl 超时/边缘掐断 · 502/503/504 网关)= Railway 偶发 → 只告警不拖红
            #   (NUC_1 实测: essence 跑满后紧接的 curate 撞 HTTP 000, 此前是它 exit 1 拖红整 run)。
            # - 系统性(curl DNS/拒连/URL错 · 4xx 鉴权 · 200+ok=false=worker 真跑了但全军覆没 #56)→ 判红。
            if [ "$(worker_fail_kind "$curl_rc" "$code")" = "transient" ]; then
              echo "::warning::curate 瞬时失败(curl_rc=$curl_rc HTTP $code ok=$ok); 幂等下轮 cron 续, 不拖红。"
            else
              echo "::error::curate failed (curl_rc=$curl_rc HTTP $code ok=$ok) —— 配置/连通/鉴权 或 全军覆没, 需排查。"
              exit 1
            fi
          fi

      - name: TV 爆款 → sanshengliubu.reference_samples (通道 1)
        id: ssll_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true'
        working-directory: scripts
        run: |
          DRYRUN=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRYRUN="--dry-run"
          python sync_truth_vault_baokuan_to_sanshengliubu.py $DRYRUN

      # 通道2 push 已退役 (D-038 / docs/15): TV 不再写 autowriter.items;
      # aw 改为 write-time 主动 pull 馆员书架 (见上 curate_sync 步骤策展经验卡)。
      # 历史脚本 sync_truth_vault_baokuan_to_autowriter_items.py 保留在 repo 备查。

      - name: autowriter 人工审稿决定 → truth_vault.prepublish_evaluations
        id: prepublish_sync
        continue-on-error: true
        if: steps.check.outputs.skip != 'true'
        working-directory: scripts
        run: |
          DRYRUN=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRYRUN="--dry-run"
          # 2026-05-22 audit P1/P2-4: 默认 365 天窗口足够日 cron 抓到迟到决策;
          # autowriter.items 没有 updated_at 列, 我们按 created_at 滚动取. 月度
          # 可以跑一次 --since-days 0 全扫补漏 (在另一个 workflow / 手动 cron).
          python sync_autowriter_decisions_to_prepublish.py $DRYRUN

      - name: positive pool 饱和度检查 (advisory, 不 fail)
        if: steps.check.outputs.skip != 'true' && always()
        working-directory: scripts
        run: |
          python check_positive_saturation.py || true  # advisory only

      - name: prune 馆员旧缓存 (advisory, 不 fail)
        if: steps.check.outputs.skip != 'true' && always()
        working-directory: scripts
        run: |
          # flywheel_librarian_cache 里 library_version 过期的死行会无限累积;
          # 删掉 >30 天没命中的(advisory,删不动也不影响整轮)。
          # dry_run 时只数不删 —— 对齐本 workflow "dry_run=不写 Supabase" 的承诺(codex review)。
          DRY=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          python prune_librarian_cache.py --ttl-days 30 $DRY || true

      - name: Show flywheel status (truth_vault.v_flywheel_sync_status)
        if: steps.check.outputs.skip != 'true' && always()
        working-directory: scripts
        run: |
          python - <<'PY' || true
          from _common import get_supabase_client
          sb = get_supabase_client()
          res = sb.schema("truth_vault").table("v_flywheel_sync_status").select("*").execute()
          for r in (res.data or []):
              print(
                f"  {r['project_id']:<16} "
                f"baokuan={r['total_baokuan']:>3} | "
                f"→ssll {r['synced_to_ssll']:>3}/{r['pending_ssll_sync']:>3} | "
                f"ref={r['total_reference']:>3}(→ssll {r['synced_reference_to_ssll']}/{r['pending_reference_ssll']}) | "
                f"last_ssll={r['last_baokuan_sync_to_ssll_at']}"
              )
          PY

      # ── 失败聚合: 任一 sync step 失败 → 整 workflow 失败 → GitHub 默认发邮件 ──
      # 2026-05-22 audit 改进: 老版本每个 sync 步骤用 "|| echo warning" 吞错误,
      # workflow 永远 success, cron 静默漂移到 ssll/aw 没数据也没告警. 现在每个
      # sync step 用 continue-on-error: true 单独跑完, 最后这步聚合所有 outcome,
      # 任一 failure 就 exit 1, GitHub 自动给 repo owner / actor 发邮件.
      - name: Fail job on any sync failure (so GitHub notifies)
        if: steps.check.outputs.skip != 'true' && always()
        run: |
          failed_steps=""
          if [ "${{ steps.feishu_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps feishu_sync"
          fi
          if [ "${{ steps.comments_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps comments_sync"
          fi
          if [ "${{ steps.essence_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps essence_sync"
          fi
          if [ "${{ steps.curate_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps curate_sync"
          fi
          if [ "${{ steps.ssll_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps ssll_sync"
          fi
          if [ "${{ steps.prepublish_sync.outcome }}" = "failure" ]; then
            failed_steps="$failed_steps prepublish_sync"
          fi
          if [ -n "$failed_steps" ]; then
            echo "::error::Daily TV sync failed steps:$failed_steps"
            echo "Repo owner will get an email via GitHub default notifications."
            echo "Investigate: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            exit 1
          fi
          echo "✅ All sync steps succeeded."
