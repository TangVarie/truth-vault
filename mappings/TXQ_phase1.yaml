# ════════════════════════════════════════════════════════════════════
# 唐小轻 · TXQ_phase1 —— Onboarding 草稿(DRAFT · A 家族)
# ════════════════════════════════════════════════════════════════════
# 起点 = data-analysis/10-project-audit.md 的 TXQ_1 审计(63 行小样本 · A 家族 ·
# tier=状态字段(趴38/预备2/爆4/大爆1/未知18)· 方向=「内容形式」3 种)+ RIO/WTG A 家族骨架。
# 真实列名 / 方向取值 / 未声明列 → preflight 拉活表校正(同 RIO/TGV 流程):
#   - A 家族指标列有两套命名先例(RIO 表1「量」/ RIO 表2「数」)→ 两套都先声明, 按 preflight 修剪;
#   - tier 源「流量状态」(WTG/RIO 表1 式)与「状态」(RIO 表2 式)同理两套都声明;
#   - 方向真实取值(内容形式 3 种)以 preflight dirs_missing 报告为准逐个补 decomposition。
# 品类: 审计 = 食品(低 GI 吐司)→ 受控闭集「食品饮料」。飞书坐标已据用户提供预填。
# ════════════════════════════════════════════════════════════════════

version: 1.0

# ── 项目元数据 ──
project_id: TXQ_phase1
brand: 唐小轻                  # 唐小轻(低 GI 健康食品)
product: 低GI吐司              # 一期主推(审计口径); 若实际多品待策略 lead 补
category: 食品饮料             # ✓ 受控闭集(审计: 食品·低GI吐司)
platform: xiaohongshu
schema_family: A               # 最新格式(DECISIONS D-006: RIO/WTG/TXQ = A 家族)
start_date: auto_from_publish_time_min
end_date: auto_from_publish_time_max

# ── 字段映射 ── [已用 preflight(run 27254906545, 读 127 行)校正到活表真实列名]
# 活表是 WTG/RIO表1 式:流量状态=tier 源, 指标用「量」;链接列叫「链接」(非「反馈链接」);
# 无数据回收列、无帐号昵称/粉丝数列。
field_mapping:
  素人编号: account_id
  文案: raw_content
  发布时间: publish_time
  链接: publish_url               # 本表叫「链接」(非 A 家族常见的「反馈链接」, preflight 实测)
  方向: _direction_raw            # → direction_decomposition(内容形式)
  流量状态: _status_raw           # tier 源(WTG/RIO表1 式;「状态」列不存在)
  曝光量: impressions             # 本表用「量」(「数」系列不存在)
  阅读量: reads
  互动量: interactions
  笔记状态: _note_status_raw       # 检测伪爆贴(含"关注"=人工假数据;非 tier 源)
  观众分析: _audience_raw          # → actual_audience_data(sync 确定性解析)
  随贴评论: _comment_text          # → comments 表(Phase2 LLM 解析)
  蓝词字段: hit_blue_keywords      # → notes.hit_blue_keywords(类型化列, WTG 同名先例;4 行有值)
  爆帖置顶评论: pinned_comment     # → notes.pinned_comment(模板/WTG/NRT 先例;raw_extra 路径不提置顶)

# ── 方向拆解 ── [preflight(run 27254999861)实测 8 种取值(审计时 3 种, 表后扩充), 全覆盖]
# content_format 用 docs/05 闭集(8 值), 保守草稿标 [待review];人群一律先 ["通用"]
# (D-010 不臆造, 唐小轻 likely 控糖/减脂人群+家庭, 待策略 lead 定)。方向五/六 未在活表出现, 暂不建。
direction_decomposition:
  "方向一 控糖早餐":
    content_format: 场景植入          # [待review] 控糖早餐场景
    target_audience: ["通用"]         # [待细化] likely 控糖/血糖管理人群
    user_pain_point: 控糖人群早餐主食选择难/低GI替代
  "方向二 健康饮食":
    content_format: 认知重构          # [待review] 健康饮食观念重塑
    target_audience: ["通用"]
    user_pain_point: 日常饮食不健康的焦虑/改善路径
  "方向三 测评分享":
    content_format: 横评对比          # 测评=对比口径
    target_audience: ["通用"]
    user_pain_point: 低GI主食选购决策/口感顾虑
  "方向四 配料表反思":
    content_format: 认知重构          # [待review] 看配料表=重构选购认知
    target_audience: ["通用"]
    user_pain_point: 配料表添加剂/隐形糖焦虑
  "方向七 代谢焦虑":
    content_format: 情感叙事          # [待review] 代谢/血糖焦虑情绪叙事
    target_audience: ["通用"]
    user_pain_point: 代谢下降/血糖波动焦虑
  "方向八 家庭购买":
    content_format: 场景植入          # [待review] 家庭采购场景
    target_audience: ["通用"]         # [待细化] likely 宝妈/伴侣家人
    user_pain_point: 给家人选健康主食/家庭囤货
  "方向九 血糖研究":
    content_format: 认知重构          # [待review] 血糖知识/研究科普向
    target_audience: ["通用"]
    user_pain_point: 血糖知识盲区/控糖方法论
  # —— 飞书多选组合值(取基础方向口径, 同 RIO 先例)——
  "方向九 血糖研究, 方向八 家庭购买": { content_format: 认知重构, target_audience: ["通用"], user_pain_point: 血糖科普 + 家庭购买 }

tier_extraction:
  source: 状态字段                  # 审计确认 TXQ tier 来源=状态字段
  rules:
    - match_contains: ["大爆"]
      tier: 大爆
    - match_contains: ["爆贴预备"]
      tier: 预备
    - match_contains: ["爆贴"]
      tier: 爆
    - match_contains: ["参考"]
      tier: 参考
    - match_contains: ["风控"]
      tier: 风控
    - match_contains: ["无水花"]
      tier: 趴
    - match_contains: ["评估中"]
      tier: 未知
    - default: null

# ── 数值推断阈值 —— 仅对【无状态】帖子兜底(状态字段优先)。
# ⚠️ [待校准] TXQ 小样本(审计 63 行)无既往互动规模数据;入库后跑
# scripts/recommend_tier_thresholds.py 复核。起点沿用 RIO 保守值。
tier_thresholds:
  爆: 100
  大爆: 500

compliance:
  base_template: null
  custom_red_flags:
    - "食品:禁疾病治疗功效宣称(低GI≠降糖药);健康声称按平台食品内容规范"
  blue_keyword_strategy:
    primary: []                     # 待策略 lead 填(如 低GI / 控糖主食 等)
    secondary: []
    avoid: []

# 项目专属字段(进 raw_extra)—— [preflight(读 127 行)校正: 删表里没有的 11 个冗余声明
# (主页链接/帐号昵称/粉丝数/发布状态/客户反馈/客户状态筛选/发布截图/口碑通/预估发布时间/
#  发布具体时间/评论铺设情况), 补实测未声明列(蓝词图片/蓝词字段)]
project_specific_fields_to_raw_extra:
  - 数据整理
  - 是否巡查
  - 巡查状态
  - 最近检查时间
  - 已确认存活
  - 备注
  - 相关截图
  - 笔记截图
  - 内容配图
  - 合作码
  - 评论配图
  - 评论状态
  - 互动副本
  - 阅读副本
  - 曝光副本
  - 蓝词图片            # preflight 实测未声明列(4 行);图片留痕(WTG 同例)
  # (蓝词字段/爆帖置顶评论 已上移 field_mapping 类型化列 —— codex PR#97 review)

data_supplement_needed: []

# ── Sync 配置 ── (飞书坐标据用户提供 2026-06-10)
sync_config:
  source_type: feishu_api
  feishu_app_token: II7GbazobaLftcsddgMc88Gjn0d
  feishu_table_id: tblGCICmXkHwxoJV
  feishu_view_id: null
  sync_interval: on_demand        # 夜间 cron 不碰;preflight + 显式验证 OK 再翻 daily

onboarding_meta:
  onboarded_at: 2026-06-10
  onboarded_by: Claude(会话起草) + Ziao(坐标/拍板)
  strategy_lead: Ziao / 周哥
  notes: |
    DRAFT —— A 家族, 起点 = 10-project-audit TXQ_1 + RIO/WTG 骨架。流程同 RIO/TGV:
      1) preflight 拉活表(show=50)→ 修 field_mapping(删表里没有的两套命名冗余项)+
         补「未声明列」进 raw_extra;
      2) 「方向」真实取值(内容形式 3 种)→ 补 direction_decomposition([待review], 人群先「通用」);
