sync_config:
  source_type: feishu_api
  feishu_app_token: null            # [待填] WTG 飞书表 URL 里 base/ 后那串 bascnXXX
  feishu_table_id: null             # [待填] table= 后那串 tblXXX
  feishu_view_id: null              # [待填/可选] 默认全表视图 vewXXX (别填带过滤的)
