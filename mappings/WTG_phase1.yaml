# ════════════════════════════════════════════════════════════════════
onboarding_meta:
  onboarded_at: 2026-05-22
  onboarded_by: (待填)
  strategy_lead: (待填)
  notes: |
    WTG = waytogo 个护洗护素人铺量. 670 行真实数据从 ROC素人分发表 导出.
    特点 vs NUC/NRT:
      - 状态拆两列: 笔记状态(工作流) + 流量状态(tier 源)
