# ════════════════════════════════════
# WTG_phase1 · waytogo 第 1 期 Mapping Configuration · DRAFT v1
# ════════════════════════════════════
#
# 基于 WTG_1 真实数据 710 行，6 个基础方向（单选字段，但存在多选组合）
# schema 演化标记：本表同时存在「笔记状态」和「流量状态」两列（A 家族变体）
# 「流量状态」承载 tier 语义；「笔记状态」承载发布/期数管理语义
#
# ⚠️ schema 演化说明：
#   - 传统 A 家族只有一列「状态」，WTG 拆成「笔记状态」+「流量状态」
#   - 数据用"量"（曝光量/阅读量/互动量）而非"数"，但同时具备巡查/主页链接等 A 家族指纹
#   - 判定为 A 家族（有巡查状态/最近检查时间/数据回收情况），标记 schema 演化
#
# 数据观察：
#   - 710 行全部「无水花」或「风控中」，0 爆款（爆贴/大爆选项存在但本期无命中）
#   - 互动量极低：283 行=0，201 行=1，最大值 335（仅 1 行）
#   - 无独立 intent 列（无「发布笔记」/「流量帖」/「直给笔记」列）
#   - 方向名自带 intent 语义（"产品直给型" vs "直播切片"/"破圈万用型"）
# ════════════════════════════════════════════════════════════════════

version: 1.0
project_id: WTG_phase1
brand: waytogo  # [待确认] 中文名不明确，飞书表/文案中均用英文 waytogo
product: 一次性生活用纸品系列（吐司洗脸巾/沐浴柔巾/衣物清洁湿巾/经期安心内裤/绵柔浴巾）  # [待确认]
category: 个护  # [待确认] 也可能归 FMCG
platform: xiaohongshu
schema_family: A  # schema 演化：状态拆两列（笔记状态+流量状态）
start_date: auto_from_publish_time_min
end_date: auto_from_publish_time_max

# ── 字段映射 ──
# 每一列都交代去向：field_mapping 或 project_specific_fields_to_raw_extra
field_mapping:
  素人编号: account_id
  发布时间: publish_time
  反馈链接: publish_url
  方向: _direction_raw
  流量状态: _status_raw          # tier 来源列（A 家族用状态字段）
  文案: raw_content
  随贴评论: _comment_text
  蓝词字段: hit_blue_keywords    # 本表列名与 NRT 系列不同（"蓝词字段" vs "蓝词记录"）
  曝光量: impressions
  阅读量: reads
  互动量: interactions

# WTG 无独立 intent 列，intent 由方向名推断
# 以下 intent_mapping 基于方向名内含语义（非独立字段映射）
intent_mapping:
  # WTG 无「发布笔记」字段，intent 需从 _direction_raw 推断
  # sync 脚本需特殊处理：按 direction → intent 规则
  方向三 产品直给型: conversion
  方向六 辐照消杀内裤: conversion
  方向一 直播切片: traffic
  方向二 佳琦关键词占位型: traffic
  方向四 贴全面时代: traffic
  方向五 破圈万用型: traffic

# ════════════════════════════════════
# 方向拆解 · WTG_phase1
# ════════════════════════════════════════════════════════════════════
#
# 数据观察：
# - 方向为单选字段，但 distinct 显示存在多选组合（用 " / " 分隔）
# - 6 个基础方向 + 4 个组合出现
# - 本期 0 爆款，无法从爆款分布验证策略假设
# - 方向自带产品/内容策略语义，不同于 NRT 的身份/产品/内容三维度
#
# 设计：只为 6 个基础方向建条目，多选组合由 sync 拆分套用

direction_decomposition:

  "方向一 直播切片":  # 71 条
    content_format: 场景植入  # [待确认] 直播切片 = 借李佳琦直播场景引流
    intent_override: traffic
    target_audience: ["年轻女性"]  # [待确认] 李佳琦受众画像
    user_pain_point: 直播种草后的真实使用验证  # [待确认]
    product_focus: null  # 不限定具体产品线

  "方向二 佳琦关键词占位型":  # 72 条
    content_format: 直给推荐  # [待确认] 关键词占位 = 搜索导流型内容
    intent_override: traffic
    target_audience: ["年轻女性"]  # [待确认]
    user_pain_point: 搜索"李佳琦推荐"时的信息占位  # [待确认]
    product_focus: null

  "方向三 产品直给型":  # 260 条（最大方向）
    content_format: 直给推荐
    intent_override: conversion
    target_audience: ["年轻女性"]  # [待确认] 文案看主要面向年轻女性生活场景
    user_pain_point: 日用纸品选购决策 / 使用场景痛点（出差/健身/带娃）  # [待确认]
    product_focus: null  # 覆盖吐司洗脸巾/沐浴柔巾/衣物清洁湿巾等多个 SKU
    sub_directions:
      - name: 产品直给_吐司洗脸巾
        detection_signal: |
          文案中出现以下任一信号 → 归此类:
          - 提及"吐司洗脸巾"/"洗脸巾"
          - 场景：卸妆、护肤、擦脸
        content_format: 直给推荐
        target_audience: ["年轻女性"]  # [待确认]
        user_pain_point: 洗脸巾品质/便携性
        product_focus: 吐司洗脸巾

      - name: 产品直给_沐浴柔巾
        detection_signal: |
          文案中出现以下任一信号 → 归此类:
          - 提及"沐浴柔巾"/"浴巾"
          - 场景：洗澡、健身房、出差擦身
        content_format: 直给推荐
        target_audience: ["年轻女性"]  # [待确认]
        user_pain_point: 一次性浴巾需求（出差/健身/卫生顾虑）
        product_focus: 沐浴柔巾

      - name: 产品直给_衣物清洁湿巾
        detection_signal: |
          文案中出现以下任一信号 → 归此类:
          - 提及"衣物清洁湿巾"/"口袋干洗店"
          - 场景：火锅油渍、带娃弄脏衣服
        content_format: 直给推荐
        target_audience: ["年轻女性", "宝妈"]  # [待确认]
        user_pain_point: 外出衣物应急清洁
        product_focus: 衣物清洁湿巾

      - name: 产品直给_其他
        detection_signal: 上述三类都不明确匹配时归此类
        content_format: 直给推荐
        target_audience: ["年轻女性"]  # [待确认]
        user_pain_point: 日用纸品综合需求
        product_focus: null

  "方向四 贴全面时代":  # 72 条
    content_format: 认知重构  # [待确认] "全面时代" = 品牌理念输出（一次性用品全面替代传统）
    intent_override: traffic
    target_audience: ["年轻女性"]  # [待确认]
    user_pain_point: 传统毛巾/浴巾的卫生隐患认知  # [待确认]
    product_focus: null

  "方向五 破圈万用型":  # 40 条
    content_format: 反差破圈  # [待确认] "破圈" = 非典型场景/非典型人群的意外用法
    intent_override: traffic
    target_audience: ["通用"]  # [待确认]
    user_pain_point: 产品非典型使用场景发现  # [待确认]
    product_focus: null

  "方向六 辐照消杀内裤":  # 51 条（含组合）
    content_format: 直给推荐  # [待确认] 经期安心内裤 = 直给推荐型
    intent_override: conversion
    target_audience: ["年轻女性"]  # [待确认]
    user_pain_point: 经期卫生/一次性内裤需求  # [待确认]
    product_focus: 经期安心内裤

# ════════════════════════════════════════════════════════════════════
# Tier 抽取规则
# ════════════════════════════════════════════════════════════════════
#
# WTG 特殊：tier 来源是「流量状态」列（不是传统的「状态」）
# 已映射 流量状态 → _status_raw，tier_extraction.source 仍用受控词"状态字段"

tier_extraction:
  source: 状态字段
  rules:
    - match_contains: ["大爆"]
      tier: 大爆
    - match_contains: ["爆贴预备"]
      tier: 预备
    - match_contains: ["爆贴"]
      tier: 爆
    - match_contains: ["风控"]
      tier: 风控
    - match_contains: ["参考"]
      tier: 参考
    - match_contains: ["无水花"]
      tier: 趴
    - match_contains: ["评估中"]
      tier: 未知
    - default: null

# ── Tier 数值阈值 ──  [待确认]
# 本期 0 爆款，互动量分布极低（max=335, P99≈46）
# 暂参考同平台 NRT 阈值，待实际爆款出现后校准
tier_thresholds:
  爆: 100  # [待确认] 本期无爆款验证，暂设偏低阈值
  大爆: 500  # [待确认]

# ════════════════════════════════════════════════════════════════════
# 合规  [待确认]
# ════════════════════════════════════

compliance:
  base_template: 个护  # [待确认] 若归 FMCG 则换模板
  custom_red_flags:  # [待确认]
    - "禁止虚假功效承诺（如'抑菌99.9%'无检测报告支撑）"
    - "禁止暗示医疗级别清洁效果"
    - "涉及经期内裤时避免敏感医疗表述"
    - "禁止贬低竞品"
  blue_keyword_strategy:
    primary: ["waytogo", "吐司洗脸巾"]
    secondary: ["沐浴柔巾", "衣物清洁湿巾", "经期安心内裤"]
    avoid: []  # [待确认] 需策略 lead 补充

# ════════════════════════════════════════════════════════════════════
# 数据补录
# ════════════════════════════════════════════════════════════════════

data_supplement_needed:
  - field: account_followers
    method: A 家族有主页链接列但本表实际为空，需通过 publish_url 补录
    estimated_rows: 710

# ════════════════════════════════════════════════════════════════════
# 项目专属字段进 raw_extra
# ════════════════════════════════════════════════════════════════════

project_specific_fields_to_raw_extra:
  - 合作码
  - 是否发起口碑通
  - 笔记截图
  - 笔记状态          # 发布/期数管理用，非 tier 来源
  - 内容配图
  - 评论配图
  - 评论状态
  - 爆帖置顶评论
  - 蓝词图片
  - 相关截图
  - 数据回收情况
  - 是否巡查
  - 巡查状态
  - 已确认存活
  - 最近检查时间
  - 备注
  - 主页链接
  - 发布状态
  - 数据整理
  - 观众分析
  - 曝光副本
  - 阅读副本
  - 互动副本
  - 父记录

# ════════════════════════════════════════════════════════════════════
# Sync
# ════════════════════════════════════════════════════════════════════

sync_config:
  source_type: feishu_api
  feishu_app_token: null
  feishu_table_id: null
  feishu_view_id: null
  sync_interval: on_demand

# ════════════════════════════════════════════════════════════════════
# Onboarding 元数据
# ════════════════════════════════════════════════════════════════════

onboarding_meta:
  onboarded_at: null
  onboarded_by: Ziao + Kiro (Draft)
  strategy_lead: Ziao
  project_manager: null
  notes: |
    WTG_phase1 初始草稿，基于 710 行数据 + 30 行样本文案。
    
    关键特征（vs NRT/NUC）:
    1. schema 演化：「笔记状态」+「流量状态」双状态列（传统 A 家族只有一列）
    2. 无独立 intent 列 —— intent 需从方向名推断（方向三/六=conversion，其余=traffic）
    3. 本期 0 爆款（流量状态全是"无水花"/"风控中"/"评估中"/"参考"）
    4. 方向字段虽为单选(type=4)，但 distinct 显示存在 " / " 分隔的多选组合
    5. 产品线多元（洗脸巾/浴巾/湿巾/内裤），方向三覆盖多 SKU 需 sub_direction 细分
    6. 蓝词字段命名不同于 NRT（"蓝词字段" vs "蓝词记录"），sync 需适配
    7. 「主页链接」列存在但选项值异常（显示评论/没有显示/改评显示）—— 疑似飞书配置错误
    
    待策略 lead 拍板：
    - brand 中文名（文案中无中文品牌名出现）
    - category 归属（个护 vs FMCG）
    - 各方向的 content_format / target_audience / user_pain_point
    - tier_thresholds（本期无爆款，阈值无法从数据验证）
    - 合规红线和蓝词策略
    - intent 从方向推断的逻辑是否正确
