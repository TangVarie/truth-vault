  onboarded_by: (待填)
  strategy_lead: Ziao / 周哥
  notes: |
    DRAFT(discovery)。早期 C 家族表, 实际结构异于文档 TGV_1 模板。
    待 preflight 拉【活表 tblRkIj4TS6rDGah】校正:
      1) 真实列对齐(导出≠全量, 活表可能多列/有 笔记阶段 值);
      2) 确认 tier 标注到底在哪(笔记阶段 活表是否有值 / 新爆等标在别处);
      3) 互动指标如何落库(是否映 interactions 支持数值推断)、品类(保健品/母婴)、品牌名;
