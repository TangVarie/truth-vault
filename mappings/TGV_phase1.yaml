  feishu_app_token: SWkdwJXxDi2VhkkwVJScghOwnNR
  feishu_table_id: tblRkIj4TS6rDGah
  feishu_view_id: null
  sync_interval: on_demand        # 夜间 cron 不碰;preflight + 显式验证 OK 再议

