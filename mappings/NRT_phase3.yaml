# ════════════════════════════════════════════════════════════════════
# Onboarding 元数据
# ════════════════════════════════════════════════════════════════════

onboarding_meta:
  onboarded_at: 2026-05-18
  onboarded_by: Ziao + Claude (Session #3)
  strategy_lead: Ziao
  notes: |
    Session #3 完成 NRT_3 方向拆解。基于 NRT_3 真实 1162 行数据归纳。
    
    关键策略决策:
    1. 单标产品形式（咀嚼胶/喷雾/戒烟贴）→ 直给推荐 + conversion
    2. 身份导向方向（女性/男性自发/为爱助戒）→ 情感叙事 + traffic
    3. 内容方向（NRT疗法引导）→ 认知重构 + traffic
    4. 数据 100% 验证：身份/内容方向类 = 流量帖；产品形式单标 = 直给笔记
    5. target_audience 标本期实际意图：女性自发 = 年轻女性（飞书数据全是年轻 angle）
    6. 男性自发飞书标注混杂（含女性视角错标），target_audience 留粗集合让 LLM 校准
    7. "女性自发, 男性自发"（1 条）作为数据异常 quarantine
    
    待澄清:
    - tier 阈值 200/1500 基于估算，需要数据导入后看实际互动量中位数校准
    - 男性自发的具体年龄分布需要更多样本验证（爆款只 4 条）
    - start_date / end_date 需项目经理补填
