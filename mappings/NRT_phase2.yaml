# ════════════════════════════════════════════════════════════════════
# Onboarding 元数据
# ════════════════════════════════════════════════════════════════════

onboarding_meta:
  onboarded_at: 2026-05-18
  onboarded_by: Ziao + Claude (Session #3)
  strategy_lead: Ziao
  notes: |
    Session #3 同时完成 NRT_2 和 NRT_3 方向拆解。
    NRT_2 比 NRT_3 独有"隐形烟渍"方向（11 条总，含组合）。
    
    关键发现:
    - NRT_2 用"钓鱼帖"，NRT_3 用"流量帖"，语义相同 → intent=traffic
    - "隐形烟渍" = 场景植入借助场景撬动流量，target_audience 是宝妈/中年女性（家庭主妇视角）
    - NRT_2 数据样本（孕期闻味、冰箱串味、孩子来玩咳嗽）全是家庭主妇/育儿期视角
    - NRT_2 直给笔记主要来自咀嚼胶（53 条），戒烟贴（15 条），喷雾（29 条）
