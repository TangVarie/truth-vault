# ════════════════════════════════════════════════════════════════════
# Sync
# ════════════════════════════════════════════════════════════════════

sync_config:
  # 真实 sync 脚本（truth-vault/scripts/sync_feishu_notes_to_truth_vault.py）
  # 走 feishu_api 路径；manual_xlsx 路径目前没有自动 ingest 脚本，需要人工
  # 导入或自己写。
  source_type: feishu_api
  feishu_app_token: null     # 填飞书表 app_token, 例 bascnXXXXXXXX
  feishu_table_id: null      # 填飞书表 table_id, 例 tblXXXXXXXX
  feishu_view_id: null       # 可选, 不填用 default view
  sync_interval: on_demand

# ════════════════════════════════════════════════════════════════════
# Onboarding 元数据
# ════════════════════════════════════════════════════════════════════

onboarding_meta:
  onboarded_at: 2026-05-18
  onboarded_by: Ziao + Claude (Session #5)
  strategy_lead: Ziao
  project_manager: 待补
  notes: |
    Session #5 完成 NUC_1 试点 onboarding，是 Truth Vault 第一个完整 onboarded 项目。
    
    关键决策（本次会话产生）:
    1. 4 个飞书方向 → 6 个 schema 子方向（D-014 LLM 子分类机制）
    2. 抗癌放化疗 → 语义重定义为重症慢病家属（飞书标注混杂痛风/透析等）
    3. 糖尿病方向人群最集中（病患家属），爆款率最高（12.8%）
    4. 所有爆款 100% 是流量帖（再次验证 D-012 按 intent 分轨）
    5. 合规风险点: 间接表达 + 品牌名谨慎，不是医疗属性问题
    
    LLM 子分类时机：
    - Ingest 阶段一次性调用 LLM，同时完成: 子方向分类 + essence 标注 + audience 推断 + D-013 sanity check
    - 节省 token，逻辑集中
    
    待确认/补录:
    - NUC_1 项目时间从飞书表 publish_time min/max 自动推导
    - 粉丝数补录（1102 行）
